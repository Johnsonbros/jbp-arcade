      // Handles
      cx2.fillStyle = 'rgba(150,140,100,0.2)';
      cx2.fillRect(x+40, H*0.34, 4, 10);
      cx2.fillRect(x+56, H*0.34, 4, 10);
      // Counter top
      cx2.fillStyle = 'rgba(100,90,70,0.2)';
      cx2.fillRect(x-10, H*0.2-4, 120, 6);
    }
  } else if (bgStyle === 'tiles') {
    // Bathroom: tile grid pattern in background
    cx2.fillStyle = 'rgba(100,120,150,0.08)';
    const tileOff = (bgScrollX2|0) % 48;
    for (let gx = -tileOff; gx < W + 48; gx += 48) {
      for (let gy = 0; gy < H; gy += 48) {
        cx2.strokeStyle = 'rgba(100,120,150,0.12)';
        cx2.lineWidth = 1;
        cx2.strokeRect(gx, gy, 48, 48);
        // Tile shine
        if ((gx+gy) % 96 === 0) {
          cx2.fillStyle = 'rgba(150,170,200,0.06)';
          cx2.fillRect(gx+2, gy+2, 44, 44);
        }
      }
    }
  } else if (bgStyle === 'laundry') {
    for (let x = -((bgScrollX2|0) % 180); x < W + 90; x += 180) {
      cx2.fillStyle = 'rgba(110,120,140,0.18)';
      cx2.fillRect(x, H*0.35, 70, H*0.35);
      cx2.fillStyle = 'rgba(150,170,200,0.12)';
      cx2.fillRect(x+8, H*0.39, 24, 24);
      cx2.fillRect(x+38, H*0.39, 24, 24);
      cx2.fillStyle = 'rgba(180,220,255,0.10)';
      cx2.fillRect(x+13, H*0.44, 14, 14);
      cx2.fillRect(x+43, H*0.44, 14, 14);
      cx2.fillStyle = 'rgba(210,210,230,0.14)';
      cx2.fillRect(x+78, H*0.18, 50, 3);
      cx2.fillRect(x+92, H*0.18, 2, 40);
      cx2.fillRect(x+112, H*0.18, 2, 40);
    }
  } else if (bgStyle === 'boiler') {
    for (let x = -((bgScrollX2|0) % 210); x < W + 100; x += 210) {
      cx2.fillStyle = 'rgba(80,55,20,0.22)';
      cx2.fillRect(x+15, H*0.22, 52, H*0.48);
      cx2.fillStyle = 'rgba(140,90,25,0.18)';
      cx2.fillRect(x+23, H*0.28, 14, H*0.28);
      cx2.fillRect(x+45, H*0.28, 14, H*0.28);
      cx2.fillStyle = 'rgba(255,170,60,0.14)';
      cx2.fillRect(x+24, H*0.56, 34, 12);
      cx2.fillStyle = 'rgba(120,120,120,0.16)';
      cx2.fillRect(x+92, 0, 14, H*0.7);
    }
  } else if (bgStyle === 'stack') {
    for (let x = -((bgScrollX2|0) % 140); x < W + 70; x += 140) {
      cx2.fillStyle = 'rgba(35,65,35,0.22)';
      cx2.fillRect(x+46, 0, 48, H);
      cx2.fillStyle = 'rgba(70,110,70,0.12)';
      cx2.fillRect(x+58, 0, 8, H);
      cx2.fillRect(x+74, 0, 8, H);
      for (let jy = 34; jy < H; jy += 70) {
        cx2.fillStyle = 'rgba(80,120,80,0.15)';
        cx2.fillRect(x+42, jy, 56, 5);
      }
    }
  } else if (bgStyle === 'roof') {
    const skyline = [80,120,95,160,110,140,90,150];
    for (let i = 0; i < skyline.length; i++) {
      const x = -((bgScrollX2|0) % 120) + i * 110;
      const h2 = skyline[i];
      cx2.fillStyle = 'rgba(10,20,40,0.32)';
      cx2.fillRect(x, H - h2, 70, h2);
      cx2.fillStyle = 'rgba(240,220,120,0.18)';
      for (let wy = H - h2 + 14; wy < H - 18; wy += 18) {
        cx2.fillRect(x + 12, wy, 6, 8);
        cx2.fillRect(x + 28, wy, 6, 8);
      }
    }
    cx2.fillStyle = 'rgba(90,110,140,0.18)';
    cx2.fillRect(40 - (bgScrollX2|0)%180, H*0.18, 28, H*0.45);
    cx2.fillRect(54 - (bgScrollX2|0)%180, H*0.14, 2, 20);
  } else if (bgStyle === 'beams') {
    // Attic: wooden rafters and beams
    for (let x = -((bgScrollX2|0) % 200); x < W + 100; x += 200) {
      // Diagonal beam
      cx2.fillStyle = 'rgba(100,70,30,0.2)';
      cx2.save();
      cx2.translate(x, 0);
      cx2.rotate(0.4);
      cx2.fillRect(0, -20, 18, H*1.5);
      cx2.fillStyle = 'rgba(120,85,40,0.15)';
      cx2.fillRect(3, -20, 6, H*1.5);
      cx2.restore();
      // Cross beam
      cx2.fillStyle = 'rgba(90,65,25,0.15)';
      cx2.fillRect(x-40, H*0.3, 180, 14);
    }
  } else if (bgStyle === 'tunnels') {
    // Sewer: arched tunnel segments
    for (let x = -((bgScrollX2|0) % 180); x < W + 90; x += 180) {
      // Tunnel arch
      cx2.fillStyle = 'rgba(30,60,30,0.2)';
      cx2.beginPath();
      cx2.arc(x+90, H*0.6, 85, Math.PI, 0);
      cx2.fillRect(x+5, H*0.6, 170, H*0.4);
      cx2.fill();
      // Inner arch (lighter)
      cx2.fillStyle = 'rgba(40,80,40,0.12)';
      cx2.beginPath();
      cx2.arc(x+90, H*0.6, 65, Math.PI, 0);
      cx2.fillRect(x+25, H*0.6, 130, H*0.35);
      cx2.fill();
      // Drip stains
      cx2.fillStyle = 'rgba(50,100,50,0.1)';
      cx2.fillRect(x+40, H*0.3, 3, H*0.3);
      cx2.fillRect(x+120, H*0.35, 2, H*0.25);
    }
  }

  drawAtmosphereOverlay(cx2, zone, bgStyle, game.tick);

  // Foreground parallax layer (closer, scrolls faster)
  cx2.fillStyle = zone.bg2;
  const fgScroll = game.camX * 0.4;
  cx2.globalAlpha = 0.08;
  for (let x = -((fgScroll|0) % 96); x < W + 48; x += 96) {
    cx2.fillRect(x, H*0.6, 24, H*0.4);
  }
  cx2.globalAlpha = 1.0;
  drawForegroundSilhouettes(cx2, zone, bgStyle, fgScroll);

  // Big floor landmarks to give each level a memorable place identity.
  drawFloorLandmarks(cx2, ld);
  drawFloorMechanics(cx2, ld);

  // Draw tiles
  const startTX = Math.floor(game.camX / TS);
  const startTY = Math.floor(game.camY / TS);
  const endTX = startTX + Math.ceil(viewW / TS) + 2;
  const endTY = startTY + Math.ceil(viewH / TS) + 2;

  for (let ty = startTY; ty <= endTY && ty < LH; ty++) {
    for (let tx = startTX; tx <= endTX && tx < LW; tx++) {
      if (tx < 0 || ty < 0) continue;
      const t = ld.tiles[ty][tx];
      if (t === 0) continue;
      const sx = tx * TS - game.camX;
      const sy = ty * TS - game.camY;

      if (t === 11) {
        // Q block — check if it's showing a picture (Word Rescue style in-level matching)
        const qb = game.levelData.qBlocks.find(q => q.x === tx && q.y === ty && !q.hit);
        if (qb && qb.showingPicture && qb.pictureWord) {
          // Draw picture block instead of ?
          drawPictureBlock(cx2, sx, sy, qb.pictureWord, qb.isCorrectPicture);
        } else {
          drawAnimatedQBlock(cx2, sx, sy);
        }
      } else if (t === 6) {
        // Animated water tile
        drawAnimatedWater(cx2, sx, sy, tx);
      } else {
        cx2.drawImage(getTile(t, ld.zone), sx, sy);
      }
    }
  }

  // Draw ambient particles (between tiles and player)
  drawAmbientParticles();

  // Draw bonus letters on stars
  for (const bl of ld.bonusLetters) {
    if (bl.collected) continue;
    const sx = bl.x * TS - game.camX;
    const sy = bl.y * TS - game.camY;
    cx2.drawImage(getTile(13, 0), sx, sy);
    cx2.fillStyle = '#222';
    cx2.font = 'bold 14px monospace';
    cx2.textAlign = 'center';
    cx2.fillText(bl.letter, sx + TS/2, sy + TS/2 + 5);
    cx2.textAlign = 'left';
  }

  // Draw enemies
  for (const e of ld.enemies) {
    if (!e.alive) continue;
    const sx = e.x - game.camX;
    const sy = e.y - game.camY;
    if (sx > -GRUZZLE_W && sx < W + GRUZZLE_W && sy > -GRUZZLE_H && sy < H + GRUZZLE_H) {
      if (e.hitFlash > 0) {
        cx2.fillStyle = `rgba(255,255,210,${Math.min(0.85, e.hitFlash / 18)})`;
        cx2.fillRect(sx - 3, sy - 3, GRUZZLE_W + 6, GRUZZLE_H + 6);
      }
      cx2.drawImage(getGruzzleSprite(e.zone, e.frame), sx, sy);
      if (e.stunned > 0) {
        cx2.fillStyle = 'rgba(255,245,190,0.95)';
        cx2.font = 'bold 8px monospace';
        cx2.textAlign = 'center';
        cx2.fillText(e.name || getGruzzleType(e.zone).name, sx + GRUZZLE_W / 2, sy - 4);
        cx2.textAlign = 'left';
      }
    }
  }
  if (game.revealTargetUntil > game.tick && game.showingPictures) {
    const reveal = ld.qBlocks.find(q => q.showingPicture && q.isCorrectPicture);
    if (reveal) {
      const rx = reveal.x * TS - game.camX;
      const ry = reveal.y * TS - game.camY;
      const pulse = 0.45 + Math.sin(game.tick * 0.25) * 0.2;
      cx2.strokeStyle = `rgba(255, 240, 140, ${pulse})`;
      cx2.lineWidth = 3;
      cx2.strokeRect(rx - 4, ry - 4, TS + 8, TS + 8);
      cx2.fillStyle = `rgba(255, 245, 180, ${pulse})`;
      cx2.font = 'bold 8px monospace';
      cx2.textAlign = 'center';
      cx2.fillText('Benny sees it!', rx + TS / 2, ry - 8);
      cx2.textAlign = 'left';
    }
  }

  // Draw slime projectiles
  for (const s of game.slimeProj) {
    const sx = s.x - game.camX, sy = s.y - game.camY;
    cx2.globalAlpha = 0.3;
    cx2.fillStyle = '#bbff88';
    cx2.fillRect(sx - 10, sy + 2, 10, 4);
    cx2.globalAlpha = 1;
    cx2.drawImage(getSlimeSprite(), sx - 2, sy - 1);
  }

  // Draw Benny
  const bennysx = game.bennyX - game.camX;
  const bennysy = game.bennyY - game.camY;
  if (game.bennyGlow > 0) {
    cx2.fillStyle = `rgba(255, 240, 120, ${game.bennyGlow / 50})`;
    cx2.fillRect(bennysx - 4, bennysy - 4, 28, 34);
  }
  cx2.drawImage(getBennySprite(game.bennyFrame), bennysx, bennysy);
  for (let i = 0; i < game.bennyLevel; i++) {
    const orbit = game.tick * 0.08 + i * 1.25;
    const ox = bennysx + 10 + Math.cos(orbit) * (8 + i * 1.5);
    const oy = bennysy + 10 + Math.sin(orbit) * (5 + i);
    cx2.fillStyle = i === game.bennyLevel - 1 ? '#ffee88' : '#b8ff9f';
    cx2.fillRect(ox, oy, 2, 2);
  }
  if (game.bennyPing > 0) {
    const r = 10 + (34 - game.bennyPing) * 1.1;
    const a = game.bennyPing / 34;
    const px2 = game.bennyPingX - game.camX;
    const py2 = game.bennyPingY - game.camY;
    cx2.strokeStyle = `rgba(255, 238, 136, ${a})`;
    cx2.lineWidth = 2;
    cx2.beginPath();
    cx2.arc(px2, py2, r, 0, Math.PI * 2);
    cx2.stroke();
    cx2.fillStyle = `rgba(255, 245, 180, ${a})`;
    cx2.font = 'bold 8px monospace';
    cx2.textAlign = 'center';
    cx2.fillText(game.bennyGlow > 0 ? 'ZIP!' : 'Benny!', px2, py2 - r - 4);
    cx2.textAlign = 'left';
  }
  if (game.bennySpeechTimer > 0 && game.bennySpeech) {
    const bubbleW = Math.max(44, game.bennySpeech.length * 6 + 12);
    const bubbleX = bennysx - 8;
    const bubbleY = bennysy - 24;
    cx2.fillStyle = 'rgba(12, 18, 42, 0.92)';
    cx2.fillRect(bubbleX, bubbleY, bubbleW, 16);
    cx2.strokeStyle = game.bennySpeechColor || '#ffee88';
    cx2.strokeRect(bubbleX, bubbleY, bubbleW, 16);
    cx2.fillStyle = game.bennySpeechColor || '#ffee88';
    cx2.font = 'bold 8px monospace';
    cx2.textAlign = 'center';
    cx2.fillText(game.bennySpeech, bubbleX + bubbleW / 2, bubbleY + 11);
    cx2.textAlign = 'left';
  }

  // Draw player
  const psx = game.px - game.camX;
  const psy = game.py - game.camY;
  if (game.invincible > 0 && (game.invincible & 4)) {
    // Flash when invincible
    cx2.globalAlpha = 0.5;
  }
  cx2.drawImage(getCharSprite(game.charIdx, game.animFrame, game.facing), psx, psy);
  cx2.globalAlpha = 1.0;

  // Key indicator above player when has key
  if (game.hasKey) {
    const keyBob = Math.sin(game.tick * 0.1) * 3;
    cx2.drawImage(getTile(12, 0), psx + 2, psy - 28 + keyBob, 24, 24);
  }

  if (game.hasKey) {
    const doorSX = (LW - 3) * TS - game.camX;
    const doorSY = (LH - 3) * TS - game.camY;
    const beamPulse = Math.sin(game.tick * 0.1) * 0.18 + 0.32;
    cx2.fillStyle = `rgba(255, 221, 80, ${beamPulse})`;
    cx2.fillRect(doorSX + 6, doorSY - 92, 20, 92);
    cx2.fillStyle = '#ffec9c';
    cx2.font = 'bold 10px monospace';
    cx2.textAlign = 'center';
    cx2.fillText('UP!', doorSX + TS/2, doorSY - 98);
    cx2.textAlign = 'left';
  }

  // Draw particles
  for (const p of game.particles) {
    const psx2 = p.x - game.camX, psy2 = p.y - game.camY;
    cx2.fillStyle = p.color;
    cx2.globalAlpha = p.life / 40;
    cx2.fillRect(psx2, psy2, p.size, p.size);
  }
  cx2.globalAlpha = 1.0;

  // Hurt flash overlay
  if (game.hurtFlash > 0) {
    game.hurtFlash--;
    cx2.fillStyle = `rgba(255, 0, 0, ${game.hurtFlash * 0.04})`;
    cx2.fillRect(0, 0, W, H);
  }

  cx2.restore();

  // End screen shake transform
  if (shaking) cx2.restore();

  // HUD (drawn after shake so it stays stable)
  renderHUD();

  const objectiveText = game.hasKey
    ? (ld.plan?.objectivePost || 'Take the stairs up to the next floor.')
    : (ld.plan?.objectivePre || 'Match the 7 repair clues to open the stairs.');
  const tutorialHint = getTutorialHint(ld);
  const mechanicHints = [
    'Pipe sprays can boost you upward.',
    'Soap patches make the floor slippery.',
    'Bubble columns lift you toward high ledges.',
    'Laundry belts drag you sideways.',
    'Steam vents blast upward on a timer.',
    'Hidden stack shafts pull you upward.',
    'Roof gusts push you across open gaps.',
  ];
  ctx.fillStyle = 'rgba(5,10,28,0.82)';
  ctx.fillRect(10, H - 34, W - 20, 24);
  ctx.strokeStyle = '#4d79a8';
  ctx.strokeRect(10, H - 34, W - 20, 24);
  ctx.fillStyle = '#d9ecff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(tutorialHint || objectiveText, W/2, H - 18);
  ctx.textAlign = 'left';

  if (!tutorialHint) {
    ctx.fillStyle = 'rgba(8,16,36,0.72)';
    ctx.fillRect(10, HUD_H + 4, 220, 20);
    ctx.strokeStyle = '#385b86';
    ctx.strokeRect(10, HUD_H + 4, 220, 20);
    ctx.fillStyle = '#b8d9ff';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(mechanicHints[ld.zone] || '', 16, HUD_H + 17);
  }

  if (game.floorIntroTimer > 0 && ld.plan) {
    const alpha = Math.min(1, game.floorIntroTimer / 25);
    ctx.fillStyle = `rgba(0, 0, 20, ${0.78 * alpha})`;
    ctx.fillRect(120, HUD_H + 38, W - 240, 78);
    ctx.strokeStyle = `rgba(255, 221, 0, ${0.8 * alpha})`;
    ctx.lineWidth = 2;
    ctx.strokeRect(120, HUD_H + 38, W - 240, 78);
    ctx.fillStyle = `rgba(255, 221, 0, ${alpha})`;
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ld.plan.name, W/2, HUD_H + 62);
    ctx.fillStyle = `rgba(210, 232, 255, ${alpha})`;
    ctx.font = 'bold 11px monospace';
    ctx.fillText(ld.plan.intro, W/2, HUD_H + 82);
    ctx.fillStyle = `rgba(255, 236, 156, ${alpha})`;
    ctx.font = 'bold 10px monospace';
    ctx.fillText(ld.plan.radio || '', W/2, HUD_H + 100);
    ctx.textAlign = 'left';
  }

  if (game.bennyCutsceneTimer > 0) {
    const alpha = Math.min(1, game.bennyCutsceneTimer / 24);
    const bx = 46, by = HUD_H + 110;
    ctx.fillStyle = `rgba(8, 18, 40, ${0.88 * alpha})`;
    ctx.fillRect(bx, by, 264, 72);
    ctx.strokeStyle = `rgba(255, 238, 136, ${alpha})`;
    ctx.strokeRect(bx, by, 264, 72);
    ctx.save();
    ctx.translate(bx + 14, by + 16);
    ctx.scale(1.7, 1.7);
    ctx.drawImage(getBennySprite((game.tick >> 3) & 1), 0, 0);
    ctx.restore();
    ctx.fillStyle = `rgba(255, 238, 136, ${alpha})`;
    ctx.font = 'bold 11px monospace';
    ctx.fillText('BENNY BOOKWORM', bx + 64, by + 20);
    ctx.fillStyle = `rgba(214, 231, 255, ${alpha})`;
    ctx.font = '10px monospace';
    ctx.fillText('I rode in with your tool bag.', bx + 64, by + 38);
    ctx.fillText('Tap SPACE or B and I will fetch nearby goodies.', bx + 64, by + 52);
    ctx.fillText('Each fetch powers me up for bigger helper tricks.', bx + 64, by + 66);
  }

  // Word reveal banner — Word Rescue style: find the matching picture!
  if (game.currentWord && game.showingPictures) {
    const bannerW = 320, bannerH = 50;
    const bx = W/2 - bannerW/2, by = HUD_H + 4;
    const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];
    // Banner background with border
    cx2.fillStyle = 'rgba(0,0,40,0.85)';
    cx2.fillRect(bx, by, bannerW, bannerH);
    cx2.strokeStyle = '#ffdd00';
    cx2.lineWidth = 2;
    cx2.strokeRect(bx, by, bannerW, bannerH);
    // Word in big yellow text
    cx2.fillStyle = '#ffdd00';
    cx2.font = 'bold 26px monospace';
    cx2.textAlign = 'center';
    cx2.fillText(game.currentWord, W/2, by + 24);
    // Instruction below
    cx2.fillStyle = '#88aaff';
    cx2.font = 'bold 11px monospace';
    cx2.fillText(
      diff.key === 'easy' ? 'Find this picture in the level!' :
      diff.key === 'medium' ? 'Read the word, then find the picture!' :
      'Match the picture, then learn a plumbing fact!',
      W/2, by + 42
    );
    if (diff.key === 'easy' && game.targetPreviewWord) {
      cx2.drawImage(getWordPicture(game.targetPreviewWord, 40, 40), bx + 10, by + 5);
    }
    if (diff.key === 'medium') {
      cx2.fillStyle = '#c7f6a2';
      cx2.font = 'bold 9px monospace';
      cx2.fillText(`Hint: ${getReadingPrompt(game.currentWord)}`, W/2 + 92, by + 16);
    }
    cx2.textAlign = 'left';
    // Pulsing border glow
    const pulse = Math.sin(game.tick * 0.1) * 0.3 + 0.4;
    cx2.strokeStyle = `rgba(255, 220, 0, ${pulse})`;
    cx2.lineWidth = 3;
    cx2.strokeRect(bx - 2, by - 2, bannerW + 4, bannerH + 4);
  }

  if (game.factTimer > 0 && game.factText) {
    const alpha = Math.min(1, game.factTimer / 24);
    const fx = 118;
    const fy = H - 74;
    ctx.fillStyle = `rgba(12, 18, 42, ${0.9 * alpha})`;
    ctx.fillRect(fx, fy, W - 236, 36);
    ctx.strokeStyle = `rgba(255, 221, 102, ${alpha})`;
    ctx.strokeRect(fx, fy, W - 236, 36);
    ctx.fillStyle = `rgba(255, 238, 136, ${alpha})`;
    ctx.font = 'bold 10px monospace';
    ctx.fillText('PLUMBING NOTE', fx + 10, fy + 13);
    ctx.fillStyle = `rgba(214, 231, 255, ${alpha})`;
    ctx.font = '10px monospace';
    ctx.fillText(game.factText, fx + 10, fy + 27);
  }
}

function drawAnimatedWater(cx2, sx, sy, tx) {
  const t = game.tick;
  // Deep water base
  cx2.fillStyle = '#0d4a7a';
  cx2.fillRect(sx, sy, TS, TS);
  cx2.fillStyle = '#1166aa';
  cx2.fillRect(sx, sy, TS, 12);
  cx2.fillStyle = '#2288dd';
  cx2.fillRect(sx, sy, TS, 6);
  // Animated wave surface
  for (let x = 0; x < TS; x += 2) {
    const waveY = Math.sin((tx * TS + x + t * 2) * 0.08) * 3;
    cx2.fillStyle = '#55bbff';
    cx2.fillRect(sx + x, sy + 1 + waveY, 2, 3);
    if ((x + t) % 8 < 3) {
      cx2.fillStyle = '#aaddff';
      cx2.fillRect(sx + x, sy + waveY, 2, 1);
    }
  }
  // Foam at surface
  for (let x = 0; x < TS; x += 4) {
    const foamW = 2 + Math.sin((tx * TS + x + t) * 0.15);
    if (foamW > 2) {
      cx2.fillStyle = 'rgba(255,255,255,0.6)';
      cx2.fillRect(sx + x, sy + Math.sin((tx * TS + x + t * 2) * 0.08) * 3, foamW, 1);
    }
  }
  // Animated bubbles rising
  const bubbleX = sx + (t * 0.5 + tx * 13) % TS;
  const bubbleY = sy + TS - ((t * 0.8 + tx * 7) % (TS - 4));
  cx2.fillStyle = 'rgba(100,187,255,0.5)';
  cx2.fillRect(bubbleX, bubbleY, 2, 2);
  // Depth shimmer
  cx2.fillStyle = 'rgba(30,100,180,0.3)';
  cx2.fillRect(sx + ((t + tx * 5) % 28), sy + 14, 6, 1);
  cx2.fillRect(sx + ((t * 0.7 + tx * 9) % 24) + 4, sy + 22, 8, 1);
}

function drawPictureBlock(cx2, sx, sy, word, isCorrect) {
  const t = game.tick;
  // Golden frame for picture block
  cx2.fillStyle = '#aa7700';
  cx2.fillRect(sx, sy, TS, TS);
  cx2.fillStyle = '#ddaa22';
  cx2.fillRect(sx+1, sy+1, TS-2, TS-2);
  cx2.fillStyle = '#ffcc44';
  cx2.fillRect(sx+2, sy+2, TS-4, TS-4);
  // Inner area for picture
  cx2.fillStyle = '#223';
  cx2.fillRect(sx+3, sy+3, TS-6, TS-6);
  // Draw a mini version of the word picture
  cx2.save();
  cx2.translate(sx+3, sy+3);
  cx2.scale(0.18, 0.18); // Scale 140px picture into ~26px space
  drawWordPicture(cx2, word, 140, 140);
  cx2.restore();
  // Gentle glow/pulse to attract attention
  const pulse = Math.sin(t * 0.1) * 0.15 + 0.15;
  cx2.fillStyle = `rgba(255, 200, 50, ${pulse})`;
  cx2.fillRect(sx, sy, TS, TS);
  // Bevel
  cx2.fillStyle = '#ffdd66';
  cx2.fillRect(sx, sy, TS, 1);
  cx2.fillRect(sx, sy, 1, TS);
  cx2.fillStyle = '#886600';
  cx2.fillRect(sx, sy+TS-1, TS, 1);
  cx2.fillRect(sx+TS-1, sy, 1, TS);
}

function drawAnimatedQBlock(cx2, sx, sy) {
  const t = game.tick;
  const pulse = Math.sin(t * 0.08) * 0.5 + 0.5;
  const glow = Math.sin(t * 0.06) * 0.2 + 0.3;

  // Outer glow aura
  cx2.fillStyle = `rgba(204, 68, 255, ${glow * 0.3})`;
  cx2.fillRect(sx - 2, sy - 2, TS + 4, TS + 4);

  // Block body
  cx2.fillStyle = PAL.qBlockDark;
  cx2.fillRect(sx, sy, TS, TS);
  // Pulsing inner color
  const r = Math.round(204 + pulse * 30);
  const g = Math.round(68 + pulse * 20);
  cx2.fillStyle = `rgb(${r},${g},255)`;
  cx2.fillRect(sx+2, sy+2, TS-4, TS-4);
  // Inner glow band
  cx2.fillStyle = `rgba(238, 136, 255, ${0.3 + pulse * 0.2})`;
  cx2.fillRect(sx+3, sy+3, TS-6, TS-6);
  cx2.fillStyle = PAL.qBlock;
  cx2.fillRect(sx+5, sy+5, TS-10, TS-10);
  // Bevel
  cx2.fillStyle = PAL.qBlockLight;
  cx2.fillRect(sx, sy, TS, 2);
  cx2.fillRect(sx, sy, 2, TS);
  cx2.fillStyle = PAL.qBlockDark;
  cx2.fillRect(sx, sy+TS-2, TS, 2);
  cx2.fillRect(sx+TS-2, sy, 2, TS);
  // Bright highlight corner
  cx2.fillStyle = '#fff';
  cx2.fillRect(sx+3, sy+3, 3, 3);
  cx2.fillStyle = PAL.qBlockLight;
  cx2.fillRect(sx+3, sy+3, 5, 5);
  cx2.fillStyle = '#fff';
  cx2.fillRect(sx+4, sy+4, 2, 2);
  // Question mark floating
  cx2.fillStyle = PAL.yellow;
  cx2.font = 'bold 20px monospace';
  cx2.textAlign = 'center';
  const qBob = Math.sin(t * 0.1) * 3;
  // Shadow of question mark
  cx2.fillStyle = 'rgba(0,0,0,0.3)';
  cx2.fillText('?', sx + TS/2 + 1, sy + TS/2 + 7 + qBob);
  // Bright question mark
  cx2.fillStyle = PAL.yellow;
  cx2.fillText('?', sx + TS/2, sy + TS/2 + 6 + qBob);
  cx2.textAlign = 'left';
  // Sparkle particles around the block (4 rotating sparkles)
  for (let i = 0; i < 4; i++) {
    const angle = t * 0.05 + i * Math.PI / 2;
    const dist = 18 + Math.sin(t * 0.12 + i) * 4;
    const spX = sx + TS/2 + Math.cos(angle) * dist;
    const spY = sy + TS/2 + Math.sin(angle) * dist;
    const spAlpha = Math.sin(t * 0.15 + i * 1.5) * 0.4 + 0.5;
    const spSize = 1 + Math.sin(t * 0.2 + i) * 1;
    cx2.fillStyle = `rgba(255, 255, 200, ${spAlpha})`;
    cx2.fillRect(spX, spY, spSize, spSize);
    // Cross sparkle shape
    cx2.fillRect(spX - 1, spY, spSize + 2, 1);
    cx2.fillRect(spX, spY - 1, 1, spSize + 2);
  }
}

function renderMatch() {
  // Semi-transparent overlay
  ctx.fillStyle = 'rgba(10, 5, 30, 0.92)';
  ctx.fillRect(0, 0, W, H);

  // Word at top
  ctx.fillStyle = PAL.yellow;
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(game.currentWord, W/2, 60);

  // "Find the picture!" instruction
  ctx.fillStyle = '#ff77cc';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('Find the picture that matches!', W/2, 90);

  // Say It button hint
  ctx.fillStyle = '#55aaff';
  ctx.font = '12px monospace';
  ctx.fillText('(Click SAY to hear the word)', W/2, 110);

  // 2x2 grid of pictures
  const picW = 150, picH = 120;
  const gridX = W/2 - picW - 20;
  const gridY = 130;
  const gap = 20;

  for (let i = 0; i < 4; i++) {
    const col = i % 2, row = Math.floor(i / 2);
    const px = gridX + col * (picW + gap*2);
    const py = gridY + row * (picH + gap);

    // Draw picture
    const word = game.matchOptions[i];
    ctx.drawImage(getWordPicture(word, picW, picH), px, py);

    // Selection border
    if (i === game.matchSelection) {
      ctx.strokeStyle = '#ffdd00';
      ctx.lineWidth = 4;
      ctx.strokeRect(px - 4, py - 4, picW + 8, picH + 8);
      // Glow
      ctx.strokeStyle = 'rgba(255, 221, 0, 0.3)';
      ctx.lineWidth = 8;
      ctx.strokeRect(px - 8, py - 8, picW + 16, picH + 16);
    } else {
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 2;
      ctx.strokeRect(px, py, picW, picH);
    }

    // Number label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`${i + 1}`, px + picW/2, py + picH + 18);
  }

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('Arrow keys to select, Enter to confirm, or press 1-4', W/2, H - 30);
  ctx.textAlign = 'left';
}

function renderComplete() {
  game.titleTimer++;
  const t = game.titleTimer;

  // Dark gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0520');
  grad.addColorStop(1, '#1a1040');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Confetti particles falling
  for (let i = 0; i < 30; i++) {
    const cx2 = ((i * 137 + t * 2) % W);
    const cy = ((i * 73 + t * 1.5) % (H + 50)) - 50;
    const colors = ['#ff3344','#ffdd00','#55ff55','#55aaff','#ff77cc','#ff8800'];
    ctx.fillStyle = colors[i % 6];
    const sz = 3 + (i % 3);
    ctx.fillRect(cx2, cy, sz, sz * 0.6);
  }

  // Big glowing title
  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 42px monospace';
  ctx.textAlign = 'center';
  // Bounce animation
  const bounce = Math.sin(t * 0.12) * 8;
  ctx.fillText('LEVEL COMPLETE!', W/2, 80 + bounce);
  // Title shadow
  ctx.fillStyle = 'rgba(255,180,0,0.3)';
  ctx.fillText('LEVEL COMPLETE!', W/2 + 2, 82 + bounce);

  // Star rating
  const stars = game.lives >= 3 ? 3 : game.lives >= 2 ? 2 : 1;
  const starY = 120;
  for (let i = 0; i < 3; i++) {
    const starX = W/2 - 60 + i * 50;
    const earned = i < stars;
    const starBounce = earned ? Math.sin(t * 0.1 + i * 0.8) * 4 : 0;
    // Star shape
    ctx.fillStyle = earned ? '#ffdd00' : '#333355';
    ctx.beginPath();
    const sz = 16;
    for (let p = 0; p < 10; p++) {
      const angle = p * Math.PI / 5 - Math.PI / 2;
      const r = p % 2 === 0 ? sz : sz * 0.45;
      const px2 = starX + 12 + Math.cos(angle) * r;
      const py2 = starY + starBounce + Math.sin(angle) * r;
      if (p === 0) ctx.moveTo(px2, py2);
      else ctx.lineTo(px2, py2);
    }
    ctx.closePath();
    ctx.fill();
    if (earned) {
      ctx.fillStyle = '#fff8cc';
      ctx.beginPath();
      for (let p = 0; p < 10; p++) {
        const angle = p * Math.PI / 5 - Math.PI / 2;
        const r = p % 2 === 0 ? sz * 0.6 : sz * 0.25;
        const px2 = starX + 12 + Math.cos(angle) * r;
        const py2 = starY + starBounce + Math.sin(angle) * r - 1;
        if (p === 0) ctx.moveTo(px2, py2);
        else ctx.lineTo(px2, py2);
      }
      ctx.closePath();
      ctx.fill();
    }
  }

  // Score with counting animation
  const displayScore = Math.min(game.score, Math.floor(t * 15));
  ctx.fillStyle = '#ff77cc';
  ctx.font = 'bold 24px monospace';
  ctx.fillText(`Score: ${displayScore}`, W/2, 190);

  const completedFloor = getFloorPlan(Math.max(0, game.level - 1));
  const completionScene = getCompletionSceneData(Math.max(0, game.level - 1));
  ctx.fillStyle = '#55aaff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(`${completedFloor.name} cleared`, W/2, 220);
  ctx.fillStyle = '#d7e9ff';
  ctx.font = '12px monospace';
  ctx.fillText(completedFloor.completeText, W/2, 244);
  ctx.fillStyle = '#ffec9c';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('WHAT YOU LEARNED', W/2, 260);
  ctx.fillStyle = '#cfe4ff';
  ctx.font = '10px monospace';
  ctx.fillText(getFloorFact(Math.max(0, game.level - 1)), W/2, 274);
  ctx.fillStyle = '#ffdd88';
  ctx.font = 'bold 10px monospace';
  ctx.fillText(`Aurora earned: ${getFloorBadge(Math.max(0, game.level - 1))}`, W/2, 288);

  drawCompletionScene(ctx, completionScene, t, false);

  // Benny celebrating too
  ctx.save();
  ctx.translate(W/2 + 116, 330 - Math.abs(Math.sin(t * 0.18)) * 12);
  ctx.scale(2, 2);
  ctx.drawImage(getBennySprite(t % 10 < 5 ? 0 : 1), 0, 0);
  ctx.restore();
  ctx.fillStyle = '#ffd4f0';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('Benny is doing happy spins!', W/2, 392);

  // Sticker earned
  ctx.fillStyle = '#ffaa00';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('TOOLBOX STICKER EARNED!', W/2, 418);
  // Sticker icon
  ctx.fillStyle = '#ffcc44';
  ctx.fillRect(W/2 - 15, 428, 30, 30);
  ctx.fillStyle = '#ffdd66';
  ctx.fillRect(W/2 - 13, 430, 26, 26);
  ctx.fillStyle = '#ffaa00';
  ctx.font = 'bold 10px monospace';
  ctx.fillText(`F${game.level}`, W/2, 448);
  ctx.fillStyle = '#fff0b8';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(getFloorBadge(Math.max(0, game.level - 1)), W/2, 468);

  const blink = Math.sin(t * 0.08) > 0;
  if (t > 60) {
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 16px monospace';
    if (blink) ctx.fillText('PRESS ENTER TO CONTINUE', W/2, 498);
  }
  ctx.textAlign = 'left';
}

function renderGameOver() {
  game.titleTimer++;
  const t = game.titleTimer;

  // Dark red gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0000');
  grad.addColorStop(0.5, '#2a0505');
  grad.addColorStop(1, '#0a0000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Dripping water/pipe leak effect in background
  for (let i = 0; i < 8; i++) {
    const dx = 60 + i * 100;
    const dripY = (t * 1.5 + i * 40) % (H + 30) - 30;
    ctx.fillStyle = `rgba(40,100,200,${0.15 + Math.sin(i) * 0.05})`;
    ctx.fillRect(dx, dripY, 3, 8);
    ctx.fillRect(dx - 1, dripY + 6, 5, 3);
  }

  // Shaking GAME OVER text
  const shake = Math.max(0, 30 - t) * 0.5;
  const shakeX = shake > 0 ? (Math.random() - 0.5) * shake : 0;
  const shakeY = shake > 0 ? (Math.random() - 0.5) * shake : 0;

  // Shadow
  ctx.fillStyle = '#440000';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2 + 3 + shakeX, 143 + shakeY);
  // Main text
  ctx.fillStyle = '#ff3333';
  ctx.fillText('GAME OVER', W/2 + shakeX, 140 + shakeY);
  // Glow
  ctx.fillStyle = '#ff6655';
  ctx.font = 'bold 46px monospace';
  ctx.globalAlpha = 0.3 + Math.sin(t * 0.1) * 0.1;
  ctx.fillText('GAME OVER', W/2 + shakeX, 140 + shakeY);
  ctx.globalAlpha = 1;

  // Sad character
  ctx.save();
  ctx.translate(W/2 - CHAR_W, 200);
  ctx.scale(2, 2);
  ctx.drawImage(getCharSprite(game.charIdx, 0, 1), 0, 0);
  ctx.restore();

  // Benny looking sad too
  ctx.save();
  ctx.translate(W/2 + CHAR_W, 240);
  ctx.scale(1.5, 1.5);
  ctx.drawImage(getBennySprite(0), 0, 0);
  ctx.restore();

  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(`Score: ${game.score}`, W/2, 350);

  ctx.fillStyle = '#aaaacc';
  ctx.font = '14px monospace';
  const failedFloor = getFloorPlan(Math.min(game.level, FLOOR_COUNT - 1));
  ctx.fillText(`Made it to ${failedFloor.name}`, W/2, 380);
  ctx.font = '12px monospace';
  ctx.fillText(failedFloor.failText, W/2, 402);

  if (t > 60) {
    const blink = Math.sin(t * 0.08) > 0;
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 16px monospace';
    if (blink) ctx.fillText('PRESS ENTER TO TRY AGAIN', W/2, 440);
  }
  ctx.textAlign = 'left';
}

function renderWin() {
  game.titleTimer++;
  const t = game.titleTimer;
  const finaleScene = getCompletionSceneData(6);
  const finaleLines = [
    'BOSS: Good work. You helped every floor on the way up.',
    'APPRENTICE: I fixed leaks, clogs, and the roof main.',
    'BOSS: Welcome aboard, Junior Plumber.'
  ];

  // Gold/blue gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#001030');
  grad.addColorStop(0.4, '#002060');
  grad.addColorStop(1, '#001030');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Big confetti celebration
  for (let i = 0; i < 50; i++) {
    const cx2 = ((i * 137 + t * 1.8) % (W + 40)) - 20;
    const cy = ((i * 73 + t * 1.2) % (H + 60)) - 30;
    const colors = ['#ff3344','#ffdd00','#55ff55','#55aaff','#ff77cc','#ff8800','#aa55ff','#ffffff'];
    ctx.fillStyle = colors[i % 8];
    const sz = 3 + (i % 4);
    const rot = (t * 0.05 + i) % 1;
    ctx.fillRect(cx2, cy, sz * rot, sz * (1 - rot) + 1);
  }

  // Rainbow shimmer title
  const hue = (t * 3) % 360;
  ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('YOU WIN!', W/2, 80 + Math.sin(t * 0.1) * 5);
  ctx.fillStyle = `hsl(${(hue + 30) % 360}, 100%, 80%)`;
  ctx.font = 'bold 46px monospace';
  ctx.globalAlpha = 0.4;
  ctx.fillText('YOU WIN!', W/2, 80 + Math.sin(t * 0.1) * 5);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#ff77cc';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('You found the boss and fixed the rooftop main!', W/2, 120);

  ctx.fillStyle = '#55aaff';
  ctx.font = 'bold 24px monospace';
  ctx.fillText(`Final Score: ${game.score}`, W/2, 160);
  ctx.fillStyle = '#ffec9c';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('The whole building glows back to life at sunset.', W/2, 184);

  drawCompletionScene(ctx, finaleScene, t, true);

  ctx.fillStyle = '#ffec9c';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(finaleLines[0], W/2, 408);
  ctx.fillStyle = '#c7f6a2';
  ctx.fillText(finaleLines[1], W/2, 426);
  ctx.fillStyle = '#ffeeaa';
  ctx.fillText(finaleLines[2], W/2, 444);
  ctx.fillStyle = '#ffec9c';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('BIG PLUMBING LESSON', W/2, 460);
  ctx.fillStyle = '#cfe4ff';
  ctx.font = '10px monospace';
  ctx.fillText(getFloorFact(6), W/2, 474);
  ctx.fillStyle = '#fff0b8';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(`Aurora badge: ${getFloorBadge(6)}`, W/2, 490);

  // Benny in the middle celebrating
  ctx.save();
  ctx.translate(W/2 - 15, 330 - Math.abs(Math.sin(t * 0.15)) * 15);
  ctx.scale(2.5, 2.5);
  ctx.drawImage(getBennySprite(t % 8 < 4 ? 0 : 1), 0, 0);
  ctx.restore();
  ctx.fillStyle = '#ffd4f0';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('Benny is sparkling like crazy!', W/2, 392);

  // JBP Branding
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText("AURORA'S FIRST BIG JOB IS COMPLETE", W/2, 510);
  ctx.fillStyle = '#aaa';
  ctx.font = '14px monospace';
  ctx.fillText('Johnson Bros Plumbing & Drain Cleaning', W/2, 528);

  if (t > 90) {
    const blink = Math.sin(t * 0.08) > 0;
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 16px monospace';
    if (blink) ctx.fillText('PRESS ENTER TO PLAY AGAIN', W/2, 546);
  }
  ctx.textAlign = 'left';
}

// ===================== ACTION HANDLER =====================
function handleAction() {
  ensureAudio();
  switch(game.state) {
    case STATES.TITLE:
      game.state = STATES.SELECT;
      game.titleTimer = 0;
      break;
    case STATES.SELECT:
      game.state = STATES.PLAYING;
      {
        const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];
        game.lives = diff.lives; game.score = 0; game.slime = diff.slime; game.level = 0;
      }
      initLevel();
      break;
    case STATES.MATCH:
      handleMatchSelection(game.matchSelection);
      break;
    case STATES.COMPLETE:
      initLevel();
      game.state = STATES.PLAYING;
      break;
    case STATES.OVER:
    case STATES.WIN:
      game.state = STATES.TITLE;
      game.titleTimer = 0;
      break;
  }
}

function handleNumberKey(num) {
  if (game.state === STATES.SELECT) {
    game.charIdx = num - 1;
    if (game.charIdx < 0) game.charIdx = 0;
    if (game.charIdx > 3) game.charIdx = 3;
  } else if (game.state === STATES.MATCH) {
    handleMatchSelection(num - 1);
  }
}

// Handle arrow keys in select and match screens
function handleNavigation() {
  if (game.state === STATES.SELECT) {
    if (keys['ArrowLeft']) { game.charIdx = Math.max(0, game.charIdx - 1); keys['ArrowLeft'] = false; }
    if (keys['ArrowRight']) { game.charIdx = Math.min(3, game.charIdx + 1); keys['ArrowRight'] = false; }
    if (keys['ArrowUp']) { game.difficulty = Math.max(0, game.difficulty - 1); keys['ArrowUp'] = false; }
    if (keys['ArrowDown']) { game.difficulty = Math.min(DIFFICULTIES.length - 1, game.difficulty + 1); keys['ArrowDown'] = false; }
  }
  if (game.state === STATES.MATCH) {
    if (keys['ArrowLeft']) { game.matchSelection = game.matchSelection % 2 === 0 ? game.matchSelection : game.matchSelection - 1; keys['ArrowLeft'] = false; }
    if (keys['ArrowRight']) { game.matchSelection = game.matchSelection % 2 === 1 ? game.matchSelection : game.matchSelection + 1; keys['ArrowRight'] = false; }
    if (keys['ArrowUp']) { game.matchSelection = game.matchSelection < 2 ? game.matchSelection : game.matchSelection - 2; keys['ArrowUp'] = false; }
    if (keys['ArrowDown']) { game.matchSelection = game.matchSelection >= 2 ? game.matchSelection : game.matchSelection + 2; keys['ArrowDown'] = false; }
  }
}

// ===================== GAME LOOP =====================
function gameLoop() {
  game.tick++;
  handleNavigation();

  switch(game.state) {
    case STATES.TITLE: renderTitle(); break;
    case STATES.SELECT: renderSelect(); break;
    case STATES.PLAYING:
      updatePlaying();
      renderPlaying();
      break;
    case STATES.MATCH: renderMatch(); break;
    case STATES.COMPLETE: renderComplete(); break;
    case STATES.OVER: renderGameOver(); break;
    case STATES.WIN: renderWin(); break;
  }

  requestAnimationFrame(gameLoop);
}

// ===================== START =====================
gameLoop();

</script>
