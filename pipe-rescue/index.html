<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pipe Rescue — Johnson Bros Plumbing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;-webkit-user-select:none}
#c{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;image-rendering:crisp-edges;display:block;margin:auto}
#touch{display:none;position:fixed;bottom:0;left:0;right:0;padding:10px 20px 20px;justify-content:space-between;align-items:flex-end;pointer-events:none;z-index:10}
.tg{display:flex;gap:8px;pointer-events:auto}
.tb{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font:bold 24px monospace;color:rgba(255,255,255,.6)}
.tb.active{background:rgba(255,255,255,.35)}
.tb.jb{width:84px;height:84px;background:rgba(41,173,255,.2);border-color:rgba(41,173,255,.5);font-size:14px}
.tb.sb{width:68px;height:68px;background:rgba(50,200,50,.2);border-color:rgba(50,200,50,.5);font-size:14px}
#sayit{position:fixed;top:4px;right:10px;width:44px;height:44px;border-radius:50%;background:rgba(41,173,255,.25);border:2px solid rgba(41,173,255,.5);display:none;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,.8);pointer-events:auto;z-index:11;cursor:pointer}
@media(pointer:coarse){#touch{display:flex}#sayit{display:flex}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="touch">
  <div class="tg"><div class="tb" id="bl">&lt;</div><div class="tb" id="br">&gt;</div></div>
  <div class="tg"><div class="tb sb" id="bslime">S</div><div class="tb jb" id="bj">JUMP</div></div>
</div>
<div id="sayit">SAY</div>
<script>
'use strict';
// ============================================================
// PIPE RESCUE — A Johnson Bros Plumbing Adventure
// Word Rescue clone (1992) with plumbing theme
// Single-file HTML5 game — no external dependencies
// ============================================================

// ===================== CONSTANTS =====================
const W = 800, H = 500, TS = 32, LW = 100, LH = 16;
const HUD_H = 30;
const GRAV = 0.38, MAXFALL = 9, SPEED = 3.5, JUMPV = -10.5, COYOTE = 8;
const STATES = { TITLE:0, SELECT:1, PLAYING:2, MATCH:3, COMPLETE:4, OVER:5, WIN:6 };
const FPS = 60;
const CAMERA_ZOOM = 1.36;

// ===================== PALETTE =====================
const PAL = {
  bg: '#1a0a2e', sky: '#2d1b69', ground: '#4a3728', brick: '#8b4513',
  pipe: '#708090', pipeLight: '#a0b0c0', pipeDark: '#4a5a6a',
  metal: '#888', metalLight: '#bbb', metalDark: '#555',
  wood: '#a0722b', woodLight: '#c8944a', woodDark: '#7a5520',
  water: '#2288dd', waterLight: '#55bbff', waterDark: '#1166aa',
  lava: '#ff4400', red: '#ee3333', green: '#33cc33', blue: '#3388ff',
  yellow: '#ffdd00', pink: '#ff77cc', purple: '#aa44ff', orange: '#ff8800',
  white: '#ffffff', black: '#000000', gray: '#888888', darkGray: '#444444',
  hud: '#111133', hudBorder: '#4444aa',
  qBlock: '#cc44ff', qBlockDark: '#8822aa', qBlockLight: '#ee88ff',
  skin1: '#c68642', skin2: '#f5d6ba', skin3: '#8d5524', skin4: '#ffdbac',
  hair1: '#2c1810', hair2: '#d4a862', hair3: '#1a0e0a', hair4: '#f0d080',
};

function getZoneArt(zone) {
  let z = 0;
  if (typeof zone === 'number' && Number.isFinite(zone)) {
    z = zone;
  } else if (zone && typeof zone.zone === 'number' && Number.isFinite(zone.zone)) {
    z = zone.zone;
  } else if (zone && typeof zone.difficulty === 'number' && Number.isFinite(zone.difficulty)) {
    z = zone.difficulty;
  }
  return [
    { pipe:'#6f7d92', pipeLight:'#b7c6d8', pipeDark:'#435062', ground:'#4d3827', top:'#75894c', haze:'rgba(120,150,255,0.10)', glow:'rgba(255,220,120,0.18)' },
    { pipe:'#9d8b76', pipeLight:'#dac8ae', pipeDark:'#665643', ground:'#5b4733', top:'#c79b5d', haze:'rgba(255,236,200,0.10)', glow:'rgba(255,245,170,0.16)' },
    { pipe:'#8ab7c9', pipeLight:'#d9f3fb', pipeDark:'#4c7084', ground:'#47616c', top:'#d8eef6', haze:'rgba(210,240,255,0.12)', glow:'rgba(255,255,255,0.16)' },
    { pipe:'#a3abb8', pipeLight:'#e8f1ff', pipeDark:'#5d6674', ground:'#5c6672', top:'#d7e1f2', haze:'rgba(220,230,255,0.11)', glow:'rgba(255,255,255,0.14)' },
    { pipe:'#9a7354', pipeLight:'#efc39d', pipeDark:'#5e3e24', ground:'#593c25', top:'#d59b58', haze:'rgba(255,180,80,0.11)', glow:'rgba(255,180,70,0.20)' },
    { pipe:'#6a8a63', pipeLight:'#bde4b2', pipeDark:'#355132', ground:'#3f5139', top:'#7da36f', haze:'rgba(120,220,130,0.10)', glow:'rgba(160,255,180,0.16)' },
    { pipe:'#7f94ae', pipeLight:'#e4edf9', pipeDark:'#445367', ground:'#495768', top:'#ffe18a', haze:'rgba(255,170,90,0.12)', glow:'rgba(255,210,120,0.18)' },
  ][Math.min(z, 6)];
}

// ===================== CANVAS =====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;
ctx.imageSmoothingEnabled = false;

// ===================== INPUT =====================
const keys = {};
let jumpPressed = false, slimePressed = false, bennyPressed = false;
const touchState = { left:false, right:false, jump:false, slime:false };

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'KeyX') jumpPressed = true;
  if (e.code === 'KeyS') slimePressed = true;
  if (e.code === 'Space' || e.code === 'KeyB') bennyPressed = true;
  if (e.code === 'Enter' || (e.code === 'Space' && game.state !== STATES.PLAYING)) handleAction();
  if (e.code >= 'Digit1' && e.code <= 'Digit4') handleNumberKey(+e.code[5]);
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

// Touch controls
function setupTouch(id, prop) {
  const el = document.getElementById(id);
  if (!el) return;
  const on = () => { touchState[prop] = true; el.classList.add('active'); if(prop==='jump')jumpPressed=true; if(prop==='slime')slimePressed=true; };
  const off = () => { touchState[prop] = false; el.classList.remove('active'); };
  el.addEventListener('touchstart', e => { e.preventDefault(); on(); });
  el.addEventListener('touchend', e => { e.preventDefault(); off(); });
  el.addEventListener('mousedown', e => { e.preventDefault(); on(); });
  el.addEventListener('mouseup', e => { e.preventDefault(); off(); });
}
setupTouch('bl','left'); setupTouch('br','right'); setupTouch('bj','jump'); setupTouch('bslime','slime');

canvas.addEventListener('click', () => handleAction());
document.getElementById('sayit').addEventListener('click', () => { if(game.currentWord) speakWord(game.currentWord); });

function isLeft() { return keys['ArrowLeft'] || keys['KeyA'] || touchState.left; }
function isRight() { return keys['ArrowRight'] || keys['KeyD'] || touchState.right; }
function isJump() { let j = jumpPressed || touchState.jump; jumpPressed = false; return j; }
function isSlime() { let s = slimePressed || touchState.slime; slimePressed = false; return s; }
function isBenny() { let b = bennyPressed; bennyPressed = false; return b; }

// ===================== AUDIO =====================
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(type) {
  ensureAudio();
  const ac = audioCtx;
  const now = ac.currentTime;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  gain.gain.value = 0.15;

  switch(type) {
    case 'jump':
      osc.type = 'square'; osc.frequency.setValueAtTime(200,now);
      osc.frequency.linearRampToValueAtTime(500,now+0.1);
      gain.gain.linearRampToValueAtTime(0,now+0.12); osc.start(now); osc.stop(now+0.12); break;
    case 'collect':
      osc.type = 'square'; osc.frequency.setValueAtTime(523,now);
      osc.frequency.setValueAtTime(659,now+0.08); osc.frequency.setValueAtTime(784,now+0.16);
      gain.gain.linearRampToValueAtTime(0,now+0.25); osc.start(now); osc.stop(now+0.25); break;
    case 'wrong':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200,now);
      osc.frequency.linearRampToValueAtTime(100,now+0.3);
      gain.gain.linearRampToValueAtTime(0,now+0.35); osc.start(now); osc.stop(now+0.35); break;
    case 'match':
      osc.type = 'square';
      [523,659,784,1047].forEach((f,i) => osc.frequency.setValueAtTime(f,now+i*0.1));
      gain.gain.linearRampToValueAtTime(0,now+0.5); osc.start(now); osc.stop(now+0.5); break;
    case 'slime':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(600,now);
      osc.frequency.linearRampToValueAtTime(100,now+0.15);
      gain.gain.linearRampToValueAtTime(0,now+0.18); osc.start(now); osc.stop(now+0.18); break;
    case 'hurt':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300,now);
      osc.frequency.linearRampToValueAtTime(80,now+0.4);
      gain.gain.value = 0.2; gain.gain.linearRampToValueAtTime(0,now+0.45);
      osc.start(now); osc.stop(now+0.45); break;
    case 'complete':
      osc.type = 'square'; gain.gain.value = 0.12;
      [523,587,659,698,784,880,988,1047].forEach((f,i) => osc.frequency.setValueAtTime(f,now+i*0.08));
      gain.gain.linearRampToValueAtTime(0,now+0.7); osc.start(now); osc.stop(now+0.7); break;
    case 'key':
      osc.type = 'triangle';
      [880,1047,1319,1568].forEach((f,i) => osc.frequency.setValueAtTime(f,now+i*0.12));
      gain.gain.linearRampToValueAtTime(0,now+0.55); osc.start(now); osc.stop(now+0.55); break;
    case 'benny':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(740, now);
      osc.frequency.setValueAtTime(988, now + 0.06);
      osc.frequency.setValueAtTime(1319, now + 0.12);
      gain.gain.value = 0.08;
      gain.gain.linearRampToValueAtTime(0, now + 0.2);
      osc.start(now); osc.stop(now+0.2); break;
    default:
      osc.type = 'square'; osc.frequency.value = 440;
      gain.gain.linearRampToValueAtTime(0,now+0.1); osc.start(now); osc.stop(now+0.1);
  }
}

// ===================== SPEECH =====================
function speakWord(word) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(word);
  u.rate = 0.8; u.pitch = 1.2; u.volume = 0.8;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

function speakLine(text, rate = 0.92, pitch = 1.0) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate; u.pitch = pitch; u.volume = 0.78;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

// ===================== SPRITE CACHE =====================
const spriteCache = {};
function cached(key, w, h, drawFn) {
  if (spriteCache[key]) return spriteCache[key];
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const x = c.getContext('2d');
  x.imageSmoothingEnabled = false;
  drawFn(x, w, h);
  spriteCache[key] = c;
  return c;
}

// ===================== DRAW HELPERS =====================
function px(x, y, w, h, color, ctx2) { ctx2.fillStyle = color; ctx2.fillRect(x, y, w||1, h||1); }
function rect(x, y, w, h, color, ctx2) { ctx2.fillStyle = color; ctx2.fillRect(x, y, w, h); }
function outline(x, y, w, h, color, ctx2) { ctx2.strokeStyle = color; ctx2.lineWidth = 1; ctx2.strokeRect(x+0.5, y+0.5, w-1, h-1); }

// ===================== CHARACTER SPRITES =====================
// 4 selectable plumber kids: 32x48 each, 6 animation frames
// 0=brown boy, 1=white boy, 2=brown girl, 3=white girl

const CHAR_W = 32, CHAR_H = 48;
const CHAR_DEFS = [
  { name:'Marcus', skin:'#c68642', hair:'#2c1810', hairType:'short' },
  { name:'Tommy', skin:'#f5d6ba', hair:'#d4a862', hairType:'short' },
  { name:'Maya', skin:'#c68642', hair:'#1a0e0a', hairType:'pigtails' },
  { name:'Lily', skin:'#ffdbac', hair:'#f0d080', hairType:'pigtails' },
];

function drawPlumber(cx, def, frame, facing) {
  // frame: 0=idle, 1-3=walk, 4=jump, 5=celebrate
  const s = def.skin, ha = def.hair, ht = def.hairType;
  const w = CHAR_W, h = CHAR_H;
  if (facing === -1) { cx.save(); cx.translate(w, 0); cx.scale(-1, 1); }

  // Animation offsets
  let lx = 8, rx = 18, ly = 40, ry = 40;
  let armLy = 0, armRy = 0, armLx = 0, armRx = 0;
  if (frame === 1) { lx = 5; rx = 21; ly = 38; ry = 41; armLy = -2; armRy = 2; armLx = -1; armRx = 1; }
  else if (frame === 2) { lx = 8; rx = 18; ly = 40; ry = 40; }
  else if (frame === 3) { lx = 21; rx = 5; ly = 41; ry = 38; armLy = 2; armRy = -2; armLx = 1; armRx = -1; }
  else if (frame === 4) { ly = 34; ry = 34; lx = 4; rx = 22; armLy = -4; armRy = -4; }
  else if (frame === 5) { armLy = -6; armRy = -6; ly = 40; ry = 40; }

  // === BOOTS (brown leather with soles) ===
  rect(lx, ly, 9, 6, '#6b3a1f', cx);
  rect(lx+1, ly+1, 7, 2, '#8b5a3f', cx);
  rect(lx+2, ly+2, 3, 1, '#a07050', cx); // leather highlight
  rect(lx-1, ly+5, 11, 3, '#3d1e0e', cx); // thick sole
  rect(lx, ly+5, 9, 1, '#5a3520', cx); // sole top edge
  rect(rx, ry, 9, 6, '#6b3a1f', cx);
  rect(rx+1, ry+1, 7, 2, '#8b5a3f', cx);
  rect(rx+2, ry+2, 3, 1, '#a07050', cx);
  rect(rx-1, ry+5, 11, 3, '#3d1e0e', cx);
  rect(rx, ry+5, 9, 1, '#5a3520', cx);
  // Boot laces
  px(lx+3, ly+3, 3, 1, '#4a2a10', cx);
  px(rx+3, ry+3, 3, 1, '#4a2a10', cx);

  // === LEGS (blue overall pants — slightly apart) ===
  rect(8, 29, 7, ly-29+2, '#2255bb', cx);
  rect(18, 29, 7, ry-29+2, '#2255bb', cx);
  rect(9, 30, 2, 8, '#3366cc', cx); // left leg highlight
  rect(19, 30, 2, 8, '#3366cc', cx); // right leg highlight
  rect(15, 29, 2, 3, '#1a44aa', cx); // crotch shadow
  // Knee patches
  rect(9, 34, 5, 3, '#1e4e9e', cx);
  rect(19, 34, 5, 3, '#1e4e9e', cx);

  // === BODY / OVERALLS (tapered: shoulders wider than waist) ===
  rect(5, 16, 24, 4, '#2255bb', cx); // shoulders (wide)
  rect(6, 20, 22, 5, '#2255bb', cx); // mid torso
  rect(7, 25, 20, 5, '#2255bb', cx); // waist (narrower)
  rect(6, 17, 22, 3, '#2866cc', cx); // highlight band
  rect(7, 20, 20, 8, '#2866cc', cx);
  // Overall bib
  rect(10, 17, 14, 10, '#2255bb', cx);
  rect(11, 18, 12, 8, '#2460b8', cx);
  rect(18, 18, 3, 3, '#ffd84d', cx);
  px(18, 18, 2, 1, '#fff0a8', cx);
  // Bib pocket
  rect(12, 20, 8, 5, '#1a44aa', cx);
  rect(13, 21, 6, 3, '#2255bb', cx);
  px(15, 22, 2, 1, '#3366cc', cx); // pocket detail
  // Overall straps
  rect(9, 15, 4, 7, '#1e4e9e', cx);
  rect(10, 16, 2, 5, '#2255bb', cx);
  rect(20, 15, 4, 7, '#1e4e9e', cx);
  rect(21, 16, 2, 5, '#2255bb', cx);
  // Gold clasp buttons on straps
  rect(10, 17, 2, 2, '#ffcc00', cx);
  px(10, 17, 1, 1, '#ffe855', cx);
  rect(21, 17, 2, 2, '#ffcc00', cx);
  px(22, 17, 1, 1, '#ffe855', cx);
  // Side buttons
  px(7, 22, 1, 1, '#ddaa00', cx);
  px(25, 22, 1, 1, '#ddaa00', cx);

  // === RED SHIRT / COLLAR ===
  rect(8, 13, 18, 5, '#cc2222', cx);
  rect(9, 14, 16, 3, '#dd3333', cx);
  // Collar V-neck
  rect(13, 13, 2, 3, '#ee4444', cx);
  rect(18, 13, 2, 3, '#ee4444', cx);
  rect(14, 14, 5, 1, '#aa1818', cx); // shadow under collar
  // Shirt sleeves visible at shoulders
  rect(5, 14, 4, 4, '#cc2222', cx);
  rect(24, 14, 4, 4, '#cc2222', cx);

  // === TOOL BELT ===
  rect(5, 26, 24, 4, '#6b3a1f', cx);
  rect(6, 27, 22, 2, '#8b5a3f', cx);
  // Belt buckle
  rect(14, 26, 5, 4, '#ccaa00', cx);
  rect(15, 27, 3, 2, '#eedd44', cx);
  // Wrench hanging (left side)
  rect(7, 26, 2, 5, '#b0b0b0', cx);
  px(6, 25, 4, 1, '#cccccc', cx);
  px(6, 25, 1, 2, '#999', cx);
  px(9, 25, 1, 2, '#999', cx);
  // Pliers hanging (right side)
  rect(24, 26, 2, 4, '#b0b0b0', cx);
  rect(23, 29, 1, 2, '#999', cx);
  rect(26, 29, 1, 2, '#999', cx);
  rect(23, 26, 1, 2, '#cccccc', cx);
  rect(26, 26, 1, 2, '#cccccc', cx);

  // === ARMS ===
  let aLy = 16 + armLy, aRy = 16 + armRy;
  let aLx = armLx, aRx = armRx;
  if (frame === 5) { aLy = 8; aRy = 8; }
  // Left arm
  rect(1+aLx, aLy, 5, 6, s, cx);
  rect(2+aLx, aLy+1, 3, 4, lighten(s), cx);
  // Left hand with fingers
  rect(0+aLx, aLy+5, 5, 3, s, cx);
  px(1+aLx, aLy+6, 3, 1, lighten(s), cx);
  px(0+aLx, aLy+8, 2, 2, s, cx); // thumb
  px(2+aLx, aLy+8, 1, 2, darken(s), cx); // finger gap
  px(3+aLx, aLy+8, 2, 2, s, cx); // fingers
  rect(1+aLx, aLy+5, 4, 2, '#ffd84d', cx);
  // Right arm
  rect(26+aRx, aRy, 5, 6, s, cx);
  rect(27+aRx, aRy+1, 3, 4, lighten(s), cx);
  // Right hand with fingers
  rect(27+aRx, aRy+5, 5, 3, s, cx);
  px(28+aRx, aRy+6, 3, 1, lighten(s), cx);
  px(27+aRx, aRy+8, 2, 2, s, cx); // fingers
  px(29+aRx, aRy+8, 1, 2, darken(s), cx); // finger gap
  px(30+aRx, aRy+8, 2, 2, s, cx); // thumb
  rect(27+aRx, aRy+5, 4, 2, '#ffd84d', cx);

  // === NECK ===
  rect(13, 14, 6, 3, s, cx);
  rect(14, 14, 4, 3, lighten(s), cx);
  px(13, 15, 1, 1, darken(s), cx); // neck shadow left
  px(18, 15, 1, 1, darken(s), cx); // neck shadow right

  // === HEAD (rounded oval) ===
  // Build circular head from overlapping rects (wide in middle, narrow top/bottom)
  rect(12, 3, 8, 1, s, cx);   // very top (narrow)
  rect(11, 4, 10, 1, s, cx);  // top
  rect(10, 5, 12, 1, s, cx);  // upper
  rect(9, 6, 14, 4, s, cx);   // widest band (main face)
  rect(10, 10, 12, 2, s, cx); // lower face
  rect(11, 12, 10, 1, s, cx); // jaw
  rect(12, 13, 8, 1, s, cx);  // chin
  rect(13, 14, 6, 1, s, cx);  // chin tip
  // Lighter face highlight
  rect(11, 5, 10, 1, lighten(s), cx);
  rect(10, 6, 12, 4, lighten(s), cx);
  rect(11, 10, 10, 2, lighten(s), cx);
  rect(12, 12, 8, 1, lighten(s), cx);

  // === EARS ===
  rect(7, 7, 2, 4, s, cx);    // left ear
  px(7, 8, 1, 2, darken(s), cx); // ear inner shadow
  rect(23, 7, 2, 4, s, cx);   // right ear
  px(24, 8, 1, 2, darken(s), cx);

  // Eyebrows
  rect(11, 6, 4, 1, darken(ha), cx);
  rect(18, 6, 4, 1, darken(ha), cx);
  px(10, 6, 1, 1, darken(ha), cx); // brow taper left
  px(22, 6, 1, 1, darken(ha), cx); // brow taper right

  // Eyes (white with colored pupils, looking slightly to the side)
  rect(11, 7, 4, 4, '#fff', cx);
  rect(19, 7, 4, 4, '#fff', cx);
  // Lower eyelid line
  px(11, 11, 4, 1, darken(s), cx);
  px(19, 11, 4, 1, darken(s), cx);
  // Pupils (offset right for character direction)
  rect(13, 8, 2, 3, '#1a1a2e', cx);
  rect(21, 8, 2, 3, '#1a1a2e', cx);
  // Pupil core (darker)
  px(13, 9, 1, 1, '#000', cx);
  px(21, 9, 1, 1, '#000', cx);
  // Eye shine (two highlights per eye for life)
  px(12, 7, 1, 1, '#ffffff', cx);
  px(20, 7, 1, 1, '#ffffff', cx);
  px(14, 8, 1, 1, '#aaccff', cx);
  px(22, 8, 1, 1, '#aaccff', cx);
  // Girl characters get eyelashes
  if (ht === 'pigtails') {
    px(10, 7, 1, 1, '#1a1a2e', cx); // left outer lash
    px(15, 7, 1, 1, '#1a1a2e', cx); // left inner lash
    px(18, 7, 1, 1, '#1a1a2e', cx); // right inner lash
    px(23, 7, 1, 1, '#1a1a2e', cx); // right outer lash
    px(10, 6, 1, 1, '#1a1a2e', cx); // lash extension
    px(23, 6, 1, 1, '#1a1a2e', cx);
  }

  // Nose
  rect(15, 9, 3, 2, darken(s), cx);
  px(16, 9, 1, 1, s, cx);
  px(15, 11, 1, 1, darken(s), cx); // nostril shadow

  // Smile
  rect(13, 12, 7, 1, '#aa5533', cx);
  px(12, 11, 1, 1, '#aa5533', cx); // smile corner left
  px(20, 11, 1, 1, '#aa5533', cx); // smile corner right
  px(14, 13, 5, 1, '#cc6644', cx); // lower lip highlight
  // Cheek blush
  px(10, 10, 2, 1, '#e8a0a0', cx);
  px(21, 10, 2, 1, '#e8a0a0', cx);

  // === HAIR ===
  if (ht === 'short') {
    rect(8, 2, 16, 6, ha, cx);
    rect(9, 1, 14, 3, ha, cx);
    rect(7, 4, 2, 5, ha, cx); // sideburn left
    rect(23, 4, 2, 5, ha, cx); // sideburn right
    // Hair texture/highlight
    rect(10, 2, 12, 2, lighten(ha), cx);
    rect(11, 1, 8, 1, lighten(ha), cx);
    // Part line
    rect(15, 1, 1, 3, darken(ha), cx);
    // Individual hair strands at top
    px(10, 1, 1, 1, lighten(ha), cx);
    px(13, 0, 1, 2, ha, cx);
    px(18, 0, 1, 2, ha, cx);
    px(21, 1, 1, 1, lighten(ha), cx);
  } else {
    // Girl hair with pigtails
    rect(8, 2, 16, 6, ha, cx);
    rect(9, 1, 14, 3, ha, cx);
    rect(10, 2, 12, 2, lighten(ha), cx);
    // Bangs
    rect(9, 3, 14, 2, ha, cx);
    rect(10, 3, 4, 1, lighten(ha), cx);
    rect(18, 3, 4, 1, lighten(ha), cx);
    // Left pigtail
    rect(3, 3, 5, 3, ha, cx);
    rect(2, 6, 5, 8, ha, cx);
    rect(3, 14, 3, 3, ha, cx);
    rect(3, 7, 2, 6, lighten(ha), cx);
    // Right pigtail
    rect(24, 3, 5, 3, ha, cx);
    rect(25, 6, 5, 8, ha, cx);
    rect(26, 14, 3, 3, ha, cx);
    rect(27, 7, 2, 6, lighten(ha), cx);
    // Hair ties / bows
    rect(3, 4, 4, 3, '#ff4488', cx);
    px(4, 5, 2, 1, '#ff77aa', cx);
    rect(25, 4, 4, 3, '#ff4488', cx);
    px(26, 5, 2, 1, '#ff77aa', cx);
  }

  // === HARD HAT ===
  // Hat body (rounded top)
  rect(7, 0, 18, 4, '#ddaa00', cx);
  rect(8, -1, 16, 3, '#eebb00', cx);
  rect(9, -2, 14, 2, '#ffcc00', cx);
  // Hat highlight
  rect(10, -1, 10, 1, '#ffdd44', cx);
  rect(12, 0, 6, 1, '#ffee66', cx);
  rect(14, 1, 4, 1, '#fff2a8', cx);
  // Hat detail line / ridge
  rect(8, 1, 16, 1, '#cc9900', cx);
  // Brim
  rect(4, 3, 24, 3, '#ddaa00', cx);
  rect(5, 3, 22, 1, '#eebb22', cx); // brim highlight
  rect(5, 5, 22, 1, '#bb8800', cx); // brim shadow
  // Brim edge detail
  rect(4, 3, 1, 3, '#cc9900', cx);
  rect(27, 3, 1, 3, '#cc9900', cx);
  // Tiny helmet badge
  rect(14, 2, 4, 2, '#224488', cx);
  px(15, 2, 2, 1, '#77aaff', cx);

  // === CHARACTER OUTLINE (1px dark border for pop) ===
  // Scan the drawn pixels and add a dark outline around the silhouette
  const imgData = cx.getImageData(0, 0, w, h);
  const od = imgData.data;
  const outlinePixels = [];
  for (let oy = 0; oy < h; oy++) {
    for (let ox = 0; ox < w; ox++) {
      const idx = (oy * w + ox) * 4;
      if (od[idx+3] === 0) {
        // Check 4-neighbors for opaque pixel
        const neighbors = [[ox-1,oy],[ox+1,oy],[ox,oy-1],[ox,oy+1]];
        for (const [nx,ny] of neighbors) {
          if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
            const ni = (ny * w + nx) * 4;
            if (od[ni+3] > 0) { outlinePixels.push([ox,oy]); break; }
          }
        }
      }
    }
  }
  cx.fillStyle = 'rgba(10,5,20,0.55)';
  for (const [ox,oy] of outlinePixels) cx.fillRect(ox, oy, 1, 1);

  if (facing === -1) cx.restore();
}

function lighten(color) {
  const c = hexToRgb(color);
  return `rgb(${Math.min(255,c.r+40)},${Math.min(255,c.g+40)},${Math.min(255,c.b+40)})`;
}
function darken(color) {
  const c = hexToRgb(color);
  return `rgb(${Math.max(0,c.r-40)},${Math.max(0,c.g-40)},${Math.max(0,c.b-40)})`;
}
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function getCharSprite(charIdx, frame, facing) {

  return cached(key, CHAR_W, CHAR_H, (cx) => {
    drawPlumber(cx, CHAR_DEFS[charIdx], frame, facing);
  });
}

// ===================== TILE DRAWING =====================
function getTile(type, zone) {
  const key = `tile_${type}_${zone||0}`;
  return cached(key, TS, TS, (cx) => {
    switch(type) {
      case 1: drawBrickTile(cx, zone); break;     // solid brick/pipe
      case 2: drawPipeTile(cx, zone); break;       // pipe platform
      case 3: drawMetalTile(cx); break;            // metal grate
      case 4: drawWoodTile(cx); break;             // wood platform
      case 5: drawGroundTile(cx, zone); break;     // ground
      case 6: drawWaterTile(cx); break;            // water hazard
      case 7: drawOneWayTile(cx, zone); break;     // one-way platform
      case 8: drawDecorPipe(cx); break;            // decoration: pipe
      case 9: drawDecorGauge(cx); break;           // decoration: gauge
      case 10: drawExitDoor(cx); break;            // exit door
      case 11: drawQBlock(cx); break;              // question block
      case 12: drawKeyTile(cx); break;             // key
      case 13: drawStar(cx); break;                // bonus letter
      case 14: drawSlimePU(cx); break;             // slime pickup
      case 15: drawLifePU(cx); break;              // extra life
      case 16: drawDecorSign(cx, zone); break;       // sign/poster
      case 17: drawDecorShelf(cx); break;            // shelf with tools
      case 18: drawDecorDrip(cx); break;             // dripping pipe
      case 19: drawDecorToolRack(cx); break;         // tool rack
      case 20: drawDecorZone(cx, zone); break;       // zone-specific decor
    }
  });
}

function drawBrickTile(cx, zone) {
  const colors = [
    ['#8b4513','#a05a2c','#6b3510','#7a3d11','#965020'], // zone 0: brown brick
    ['#708090','#8899aa','#556677','#657585','#7a8a9a'], // zone 1: gray pipe
    ['#885522','#aa7744','#664411','#7a4c1a','#996633'], // zone 2: copper
    ['#446688','#5577aa','#335566','#3d5d7d','#4f6f99'], // zone 3: blue steel
    ['#884444','#aa5555','#663333','#7a3c3c','#994d4d'], // zone 4: red industrial
    ['#4f6b44','#6f945f','#2e4127','#44603d','#5d8152'], // zone 5: stack green
    ['#56657b','#8ea4c5','#354150','#46556a','#70859f'], // zone 6: roof steel
  ];
  const z = Math.min(zone||0, 6);
  const [base, light, dark, alt1, alt2] = colors[z];
  rect(0, 0, TS, TS, base, cx);
  // Individual bricks with color variation
  const brickColors = [base, alt1, alt2, base, alt1, base, alt2, alt1];
  let brickIdx = 0;
  for (let row = 0; row < 4; row++) {
    const y = row * 8;
    const off = (row % 2) * 16;
    // Mortar lines (recessed look)
    rect(0, y, TS, 1, dark, cx);
    rect(off, y, 1, 8, dark, cx);
    rect(off+16, y, 1, 8, dark, cx);
    // First brick in row
    const bc1 = brickColors[brickIdx++ % 8];
    rect(off+1, y+1, 15, 7, bc1, cx);
    // Highlight on top edge of each brick
    rect(off+1, y+1, 14, 1, light, cx);
    // Subtle highlight stripe
    rect(off+2, y+2, 10, 2, light, cx);
    // Shadow on bottom edge
    rect(off+1, y+6, 14, 1, dark, cx);
    // Second brick
    const bx2 = (off+16) % TS;
    const bc2 = brickColors[brickIdx++ % 8];
    rect(bx2+1, y+1, 15, 7, bc2, cx);
    rect(bx2+1, y+1, 14, 1, light, cx);
    rect(bx2+2, y+2, 10, 2, light, cx);
    rect(bx2+1, y+6, 14, 1, dark, cx);
  }
  // Top edge highlight for 3D feel
  rect(0, 0, TS, 1, light, cx);
  // Bottom shadow
  rect(0, TS-1, TS, 1, dark, cx);
}

function drawPipeTile(cx, zone) {
  const art = getZoneArt(zone);
  // Darker edges for depth
  rect(0, 0, TS, TS, art.pipeDark, cx);
  rect(1, 0, 30, TS, darken(art.pipe), cx);
  rect(3, 0, 26, TS, art.pipe, cx);
  // Metallic sheen - highlight stripe
  rect(5, 0, 8, TS, art.pipeLight, cx);
  rect(7, 0, 3, TS, lighten(art.pipeLight), cx); // bright center highlight
  // Dark right edge for roundness
  rect(27, 0, 3, TS, darken(art.pipeDark), cx);
  rect(29, 0, 2, TS, art.pipeDark, cx);
  // Joint collars at top and bottom
  rect(0, 0, TS, 5, art.pipe, cx);
  rect(0, 0, TS, 2, art.pipeLight, cx);
  rect(0, 2, TS, 1, lighten(art.pipeLight), cx); // collar highlight
  rect(0, 4, TS, 1, art.pipeDark, cx); // collar shadow
  rect(0, TS-5, TS, 5, art.pipe, cx);
  rect(0, TS-2, TS, 2, art.pipeDark, cx);
  rect(0, TS-5, TS, 1, art.pipeLight, cx);
  // Rivets/bolts with 3D look
  for (let i = 0; i < 4; i++) {
    const rx = 3 + i * 8;
    // Top row rivets
    rect(rx, 1, 3, 3, '#8899aa', cx);
    px(rx, 1, 2, 1, PAL.metalLight, cx); // rivet highlight

    // Bottom row rivets
    rect(rx, TS-4, 3, 3, '#8899aa', cx);
    px(rx, TS-4, 2, 1, PAL.metalLight, cx);
    px(rx+1, TS-2, 2, 1, PAL.metalDark, cx);
  }
}

function drawMetalTile(cx) {

  for (let y = 0; y < TS; y += 2) {
    const shade = y % 4 === 0 ? '#6e7f90' : '#607080';

  // Diamond plate raised bumps
  for (let y = 0; y < TS; y += 8) {
    for (let x = 0; x < TS; x += 8) {
      rect(x+2, y+2, 4, 4, '#7a8b9c', cx);

  rect(1, 1, 3, 3, '#8899aa', cx);
  px(2, 2, 1, 1, '#aabbcc', cx);
  rect(28, 1, 3, 3, '#8899aa', cx);
  px(29, 2, 1, 1, '#aabbcc', cx);
  rect(1, 28, 3, 3, '#8899aa', cx);
  px(2, 29, 1, 1, '#aabbcc', cx);
  rect(28, 28, 3, 3, '#8899aa', cx);

  rect(0, TS-1, TS, 1, '#4a5a6a', cx);

function drawWoodTile(cx) {

  rect(0, 15, TS, 2, PAL.woodDark, cx); // plank division
  rect(0, TS-1, TS, 1, PAL.woodDark, cx); // bottom shadow
  // Wood grain lines (flowing, organic)
  for (let y = 0; y < TS; y += 3) {
    const grainOff = Math.sin(y * 0.3) * 2;
    rect(grainOff + 2, y, TS - 4, 1, y % 6 === 0 ? PAL.woodLight : PAL.woodDark, cx);

  // Knot with rings
  rect(11, 11, 8, 8, PAL.woodDark, cx);
  rect(12, 12, 6, 6, '#8a6025', cx);
  rect(13, 13, 4, 4, PAL.wood, cx);
  rect(14, 14, 2, 2, PAL.woodDark, cx); // center of knot

  rect(24, 22, 4, 4, PAL.woodDark, cx);
  rect(25, 23, 2, 2, PAL.wood, cx);
  // Nail heads with shine
  rect(3, 3, 3, 3, '#888', cx);
  px(3, 3, 2, 1, '#bbb', cx); // nail shine
  px(4, 4, 1, 1, '#666', cx); // nail slot
  rect(26, 3, 3, 3, '#888', cx);
  px(26, 3, 2, 1, '#bbb', cx);
  rect(3, 20, 3, 3, '#888', cx);
  px(3, 20, 2, 1, '#bbb', cx);
  rect(26, 20, 3, 3, '#888', cx);
  px(26, 20, 2, 1, '#bbb', cx);

function drawOneWayTile(cx, zone) {
  // Yellow/black hazard stripe construction platform
  rect(0, 0, TS, 8, '#555', cx);
  rect(0, 0, TS, 1, '#888', cx); // top highlight
  // Hazard stripes
  for (let x = -8; x < TS + 8; x += 8) {
    cx.fillStyle = '#ffcc00';
    cx.beginPath();
    cx.moveTo(x, 1); cx.lineTo(x+4, 1); cx.lineTo(x+8, 7); cx.lineTo(x+4, 7);
    cx.fill();
    cx.fillStyle = '#222';
    cx.beginPath();
    cx.moveTo(x+4, 1); cx.lineTo(x+8, 1); cx.lineTo(x+12, 7); cx.lineTo(x+8, 7);
    cx.fill();
  }
  // Metal edge lines
  rect(0, 0, TS, 1, '#999', cx);
  rect(0, 7, TS, 1, '#333', cx);
  // Bolts at edges
  px(2, 3, 2, 2, '#aaa', cx);
  px(28, 3, 2, 2, '#aaa', cx);
}

function drawDecorSign(cx, zone) {
  // Small signs — JBP logo, arrow signs, plumbing notices
  const z = zone || 0;
  rect(4, 6, 24, 18, '#ddd8c8', cx); // sign board
  rect(5, 7, 22, 16, '#e8e4d4', cx);
  outline(4, 6, 24, 18, '#8a7a5a', cx); // border
  // Hanging wire
  rect(14, 0, 1, 6, '#666', cx);
  rect(18, 0, 1, 6, '#666', cx);
  rect(12, 0, 8, 2, '#777', cx);
  if (z === 0 || z === 4) {
    // "JBP" logo sign
    cx.fillStyle = '#2255bb'; cx.font = 'bold 8px monospace';
    cx.fillText('JBP', 8, 18);
    rect(8, 20, 16, 2, '#cc2222', cx); // red underline
  } else if (z === 1) {
    // Arrow sign
    rect(8, 12, 12, 3, '#cc2222', cx);
    rect(20, 10, 4, 7, '#cc2222', cx); // arrow head
    px(24, 13, 2, 1, '#cc2222', cx);
  } else if (z === 2) {
    // "CAUTION" sign
    rect(6, 8, 20, 12, '#ffcc00', cx);
    cx.fillStyle = '#222'; cx.font = 'bold 4px monospace';
    cx.fillText('WATER', 8, 16);
  } else {
    // Plumbing notice
    cx.fillStyle = '#555'; cx.font = '5px monospace';
    cx.fillText('PIPES', 9, 15);
    cx.fillText('OK', 12, 21);
  }
}

function drawDecorShelf(cx) {
  // Shelf with tools on background
  rect(2, 14, 28, 3, '#7a5520', cx); // shelf plank

  rect(2, 16, 28, 1, '#5a3a10', cx); // shadow

function drawAtmosphereOverlay(cx2, zone, bgStyle, t) {
  const art = getZoneArt(zone.zone || zone);

const GRUZZLE_W = 24, GRUZZLE_H = 20;
const GRUZZLE_COLORS = [
  { body:'#44bb44', light:'#66dd66', dark:'#228822', eye:'#fff' }, // green
  { body:'#8844cc', light:'#aa66ee', dark:'#6622aa', eye:'#fff' }, // purple
  { body:'#8b6534', light:'#aa8855', dark:'#6a4422', eye:'#fff' }, // brown
  { body:'#4488cc', light:'#66aaee', dark:'#2266aa', eye:'#fff' }, // blue
  { body:'#cc3333', light:'#ee5555', dark:'#aa1111', eye:'#fff' }, // red
];

function getGruzzleSprite(zone, frame) {
  const key = `gruzzle_${zone}_${frame}`;
  return cached(key, GRUZZLE_W, GRUZZLE_H, (cx) => {
    const c = GRUZZLE_COLORS[Math.min(zone, 4)];
    const type = getGruzzleType(zone);
    const bob = frame % 2 === 0 ? 0 : 1;
    const squash = frame % 2 === 0 ? 0 : 1; // squash/stretch
    // Ground shadow
    cx.fillStyle = 'rgba(0,0,0,0.2)';
    cx.fillRect(4, 18+bob, 16, 2);
    // Feet (small stubby)
    rect(3, 16+bob, 5, 4, c.dark, cx);
    rect(16, 16+bob, 5, 4, c.dark, cx);
    rect(4, 17+bob, 3, 2, c.body, cx); // foot highlight
    rect(17, 17+bob, 3, 2, c.body, cx);
    // Toes
    px(2, 18+bob, 2, 2, c.dark, cx);
    px(20, 18+bob, 2, 2, c.dark, cx);
    // Body blob (round and blobby)
    rect(2, 5+bob-squash, 20, 12+squash, c.body, cx);
    rect(4, 3+bob-squash, 16, 14+squash, c.body, cx);
    rect(6, 2+bob-squash, 12, 15+squash, c.body, cx);
    // Belly highlight (lighter center for roundness)
    rect(7, 8+bob, 10, 5, c.light, cx);
    rect(8, 7+bob, 8, 7, c.light, cx);
    // Top highlight for 3D roundness
    rect(8, 3+bob-squash, 8, 3, c.light, cx);
    // Shadow at bottom for 3D
    rect(5, 14+bob, 14, 2, c.dark, cx);
    // Side shading
    rect(2, 6+bob, 2, 8, c.dark, cx);
    rect(20, 6+bob, 2, 8, c.dark, cx);
    // Eyes (big white with colored pupils)
    // Eye whites
    rect(4, 4+bob-squash, 7, 7, c.eye, cx);
    rect(13, 4+bob-squash, 7, 7, c.eye, cx);
    // Eye outlines
    cx.strokeStyle = c.dark; cx.lineWidth = 1;
    cx.strokeRect(4.5, 4.5+bob-squash, 6, 6);

    // Colored pupils (match zone color but darker)
    rect(7, 6+bob-squash, 3, 4, c.dark, cx);
    rect(16, 6+bob-squash, 3, 4, c.dark, cx);
    // Pupil center
    rect(8, 7+bob-squash, 2, 2, '#111', cx);
    rect(17, 7+bob-squash, 2, 2, '#111', cx);
    // Eye shine
    px(5, 5+bob-squash, 2, 2, '#eef', cx);
    px(14, 5+bob-squash, 2, 2, '#eef', cx);

    rect(4, 3+bob-squash, 7, 1, c.dark, cx);

    rect(11, 14+bob, 2, 1, '#eee', cx);
    // Tongue
    rect(10, 14+bob, 3, 1, '#c44', cx);

    px(3, 8+bob, 2, 2, c.light, cx);

      px(4, 2+bob, 1, 1, c.light, cx);
      px(19, 2+bob, 1, 1, c.light, cx);
    } else if (zone === 1) {
      rect(2, 8+bob, 3, 4, '#cfd7ff', cx);
      rect(19, 8+bob, 3, 4, '#cfd7ff', cx);
      px(2, 9+bob, 2, 1, '#fff', cx);
      px(19, 9+bob, 2, 1, '#fff', cx);

// Detailed pixel art picture draw functions for plumbing words
const WORD_LIST = [
  'TAP','TUB','MOP','FIX','WET','CUP','DRY','HOT',
  'PIPE','DRIP','LEAK','PUMP','PLUG','TANK','HOSE',
  'SINK','BOLT','VENT','FLOW','BATH','KNOB'
];

function drawWordPicture(cx, word, w, h) {
  // Each picture is drawn as recognizable pixel art at the given size
  cx.fillStyle = '#223';
  cx.fillRect(0, 0, w, h);

  switch(word) {
    case 'TAP': drawPicTap(cx, w, h); break;
    case 'TUB': drawPicTub(cx, w, h); break;
    case 'MOP': drawPicMop(cx, w, h); break;
    case 'FIX': drawPicFix(cx, w, h); break;
    case 'WET': drawPicWet(cx, w, h); break;
    case 'CUP': drawPicCup(cx, w, h); break;
    case 'DRY': drawPicDry(cx, w, h); break;
    case 'HOT': drawPicHot(cx, w, h); break;
    case 'PIPE': drawPicPipe(cx, w, h); break;
    case 'DRIP': drawPicDrip(cx, w, h); break;
    case 'LEAK': drawPicLeak(cx, w, h); break;
    case 'PUMP': drawPicPump(cx, w, h); break;
    case 'PLUG': drawPicPlug(cx, w, h); break;
    case 'TANK': drawPicTank(cx, w, h); break;
    case 'HOSE': drawPicHose(cx, w, h); break;
    case 'SINK': drawPicSink(cx, w, h); break;
    case 'BOLT': drawPicBolt(cx, w, h); break;
    case 'VENT': drawPicVent(cx, w, h); break;
    case 'FLOW': drawPicFlow(cx, w, h); break;
    case 'BATH': drawPicBath(cx, w, h); break;
    case 'KNOB': drawPicKnob(cx, w, h); break;
    default: cx.fillStyle='#fff'; cx.font='bold 20px monospace'; cx.fillText(word,20,60);
  }
}

function drawPicTap(cx, w, h) {
  // Silver faucet with handles
  const mx = w/2, my = h/2;
  // Faucet body

function drawFloorMechanics(cx2, ld) {
  const zones = getFloorMechanicZones(ld.zone);
  const t = game.tick;

  if (zones.sprays) {
    zones.sprays.forEach(z => {
      cx2.fillStyle = 'rgba(90, 190, 255, 0.28)';
      cx2.fillRect(z.x - game.camX + 6, z.y - game.camY, z.w - 12, z.h);
      for (let i = 0; i < 4; i++) {
        const sx = z.x - game.camX + 10 + i * 8;
        const sy = z.y - game.camY + ((t * 3 + i * 12) % Math.max(8, z.h - 8));
        cx2.fillStyle = 'rgba(190,235,255,0.75)';
        cx2.fillRect(sx, sy, 2, 10);
      }
    });
  }

  if (zones.soap) {
    zones.soap.forEach(z => {
      cx2.fillStyle = 'rgba(180, 235, 255, 0.22)';
      cx2.fillRect(z.x - game.camX, z.y - game.camY + 4, z.w, 6);
      cx2.fillStyle = 'rgba(240, 250, 255, 0.45)';
      cx2.fillText(z.dir > 0 ? '>>' : '<<', z.x - game.camX + z.w/2 - 5, z.y - game.camY + 2);
    });
  }

  if (zones.bubbles) {
    zones.bubbles.forEach(z => {
      for (let i = 0; i < 6; i++) {
        const bx = z.x - game.camX + 6 + (i * 7) % Math.max(8, z.w - 10);
        const by = z.y - game.camY + z.h - ((t * 1.5 + i * 11) % Math.max(10, z.h));
        cx2.fillStyle = 'rgba(235,245,255,0.45)';
        cx2.fillRect(bx, by, 3, 3);
      }
    });
  }

  if (zones.belts) {
    zones.belts.forEach(z => {
      cx2.fillStyle = 'rgba(255, 210, 110, 0.22)';
      cx2.fillRect(z.x - game.camX, z.y - game.camY + 2, z.w, 6);
      for (let i = 0; i < z.w; i += 18) {
        const ax = z.x - game.camX + i + 6;
        const ay = z.y - game.camY + 5;
        cx2.fillStyle = 'rgba(255,235,170,0.7)';
        if (z.dir > 0) {
          cx2.fillRect(ax, ay, 8, 2);
          cx2.fillRect(ax + 6, ay - 2, 2, 2);
          cx2.fillRect(ax + 6, ay + 2, 2, 2);
        } else {
          cx2.fillRect(ax, ay, 8, 2);
          cx2.fillRect(ax, ay - 2, 2, 2);
          cx2.fillRect(ax, ay + 2, 2, 2);
        }
      }
    });
  }

  if (zones.vents) {
    zones.vents.forEach(z => {
      const active = ((t + z.phase) % 140) < 50;
      cx2.fillStyle = active ? 'rgba(235,245,255,0.34)' : 'rgba(180,180,180,0.16)';
      cx2.fillRect(z.x - game.camX + 2, z.y - game.camY, z.w - 4, z.h);
      cx2.fillStyle = 'rgba(255,180,80,0.7)';
      cx2.fillRect(z.x - game.camX, z.y - game.camY + z.h, z.w, 4);
    });
  }

  if (zones.shafts) {
    zones.shafts.forEach(z => {
      cx2.strokeStyle = 'rgba(120,220,120,0.28)';
      cx2.strokeRect(z.x - game.camX, z.y - game.camY, z.w, z.h);
    });
  }

  if (zones.wind) {
    zones.wind.forEach(z => {
      const gust = ((t + z.phase) % 160) < 70;
      if (!gust) return;
      for (let i = 0; i < 5; i++) {
        const wx = z.x - game.camX + ((t * 2 + i * 23) % Math.max(10, z.w));
        const wy = z.y - game.camY + 10 + i * 14;
        cx2.fillStyle = 'rgba(230,245,255,0.55)';
        cx2.fillRect(wx, wy, 12, 2);
        cx2.fillRect(wx + 10, wy - 1, 2, 1);
        cx2.fillRect(wx + 10, wy + 2, 2, 1);
      }
    });
  }
}

// ===================== LEVEL GENERATION =====================
function generateLevel(levelNum) {
  const floor = getFloorPlan(levelNum);
  const zone = Math.max(0, Math.min(levelNum, FLOOR_COUNT - 1));
  const difficulty = floor.difficulty || levelNum;
  const tiles = [];
  for (let y = 0; y < LH; y++) {
    tiles[y] = [];
    for (let x = 0; x < LW; x++) tiles[y][x] = 0;
  }

  const platType = floor.platform || 1;

  const addPlatform = (x, y, w, tile = platType) => {
    if (y < 0 || y >= LH) return;
    for (let dx = 0; dx < w; dx++) {
      const tx = x + dx;
      if (tx >= 0 && tx < LW) tiles[y][tx] = tile;
    }
  };
  const addColumn = (x, y, h, tile = 5) => {
    for (let dy = 0; dy < h; dy++) {
      const ty = y + dy;
      if (x >= 0 && x < LW && ty >= 0 && ty < LH) tiles[ty][x] = tile;
    }
  };
  const addGroundRange = (x0, x1, height = 2, tile = 5) => {
    for (let x = x0; x <= x1; x++) {
      for (let dy = 0; dy < height; dy++) {
        const ty = LH - 1 - dy;
        if (x >= 0 && x < LW && ty >= 0 && ty < LH) tiles[ty][x] = tile;
      }
    }
  };
  const addScriptedPlatforms = (defs) => {
    defs.forEach(([x, y, w, tile = platType]) => addPlatform(x, y, w, tile));
  };
  const clearRect = (x, y, w, h) => {
    for (let ty = y; ty < y + h; ty++) {
      for (let tx = x; tx < x + w; tx++) {
        if (tx >= 0 && tx < LW && ty >= 0 && ty < LH) tiles[ty][tx] = 0;
      }
    }
  };
  const fillWater = (x, w, depth = 2, clearHeight = 6) => {
    for (let dx = 0; dx < w; dx++) {
      const tx = x + dx;
      if (tx < 0 || tx >= LW) continue;
      for (let dy = 0; dy < clearHeight; dy++) {
        const ty = LH - 1 - dy;
        if (ty >= 0) tiles[ty][tx] = 0;
      }

function seedRand(seed) {

function initLevel() {

  game.px = 64; game.py = (LH - 4) * TS;
  game.pvx = 0; game.pvy = 0;
  game.onGround = false;
  game.facing = 1; game.animFrame = 0;
  game.camX = 0; game.camY = 0;
  game.matched = 0;
  game.currentWord = null;
  game.currentWordIdx = -1;
  game.targetPreviewWord = null;
  game.factText = '';
  game.factTimer = 0;
  game.hardQuizShown = false;
  game.revealTargetUntil = 0;
  game.showingPictures = false;
  game.hasKey = false;
  game.slimeProj = [];
  game.slimeCooldown = 0;
  game.invincible = 0;
  game.celebrating = 0;
  game.bonusCollected = [];
  game.mysteryWord = ld.bonusWord;
  game.mysteryCollected = new Array(ld.bonusWord.length).fill(false);
  game.particles = [];
  game.ambientParticles = [];
  game.bennyGlow = 0;
  game.bennyCooldown = 0;
  game.bennyPing = 0;
  game.bennyCommandCooldown = 0;
  game.bennySpeech = '';
  game.bennySpeechTimer = 0;
  game.bennySpeechColor = '#ffee88';
  game.bennyCutsceneTimer = 0;
  if (game.level === 1 && !game.seenBennyIntro) {
    game.bennyCutsceneTimer = 150;
    game.seenBennyIntro = true;
    sayBenny('I can grab goodies nearby!', 96, '#ffee88');
  } else if (ld.plan && ld.plan.bennyLine && game.level > 1) {
    sayBenny(ld.plan.bennyLine.replace(/^Benny:\s*/, ''), 108, '#c7f6a2');
  }
  if (diff.key === 'hard') {
    game.factText = getFloorFact(game.level);
    game.factTimer = 180;
    speakWord(getFloorFact(game.level));
  }
  game.floorIntroTimer = 180;
  if (game.level === 0) {
    ld.enemies = [];
  } else if (game.level === 1) {
    ld.enemies = ld.enemies.slice(0, 1);
  }
  if (diff.key === 'easy' && game.level >= 4) {
    ld.enemies = ld.enemies.filter((_, idx) => idx % 2 === 0);
  }
  if (diff.key === 'easy' && game.level >= 5) {
    ld.enemies.forEach(e => {
      e.patrolLeft += 12;
      e.patrolRight -= 12;
    });
    if (game.level === 5) {
      ld.enemies = ld.enemies.filter((_, idx) => idx !== 1);
      ld.bonusLetters.push({x:60, y:LH-12, letter:ld.bonusWord[0] || 'B', collected:false});
    }
    if (game.level === 6) {
      ld.enemies = ld.enemies.filter((_, idx) => idx < 3);
      ld.slimePickups.push({x:72, y:LH-10, collected:false});
    }
  }
  ld.enemies.forEach(e => {
    e.vx *= diff.enemySpeed;
  });
  // Pre-seed ambient particles
  initAmbientParticles();
}

// ===================== AMBIENT PARTICLES =====================
function initAmbientParticles() {
  const ld = game.levelData;
  if (!ld) return;
  const zone = ld.zone;
  // Dust motes (all zones)
  for (let i = 0; i < 30; i++) {
    game.ambientParticles.push({
      type: 'dust',
      x: Math.random() * LW * TS,
      y: Math.random() * LH * TS,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -0.1 - Math.random() * 0.2,
      life: 200 + Math.random() * 300,
      maxLife: 500,
      size: 1 + Math.random(),
      alpha: 0.15 + Math.random() * 0.25,
    });
  }
  // Water drips in basement, bathroom, sewer
  if (zone === 0 || zone === 2 || zone === 4) {
    for (let i = 0; i < 12; i++) {
      game.ambientParticles.push({
        type: 'drip',
        x: 60 + Math.random() * (LW - 4) * TS,
        y: Math.random() * 40,
        vx: 0,
        vy: 1.5 + Math.random() * 1.5,
        life: 0,
        maxLife: 180 + Math.random() * 120,
        size: 2,
        delay: Math.floor(Math.random() * 200),
      });
    }
  }
  // Steam from water hazards
  for (let tx = 0; tx < LW; tx++) {
    for (let ty = 0; ty < LH; ty++) {
      if (ld.tiles[ty][tx] === 6 && (ty === 0 || ld.tiles[ty-1][tx] !== 6)) {
        if (Math.random() < 0.3) {
          game.ambientParticles.push({
            type: 'steam',
            x: tx * TS + Math.random() * TS,
            baseY: ty * TS,
            y: ty * TS,
            vx: (Math.random() - 0.5) * 0.5,
            vy: -0.4 - Math.random() * 0.3,
            life: 0,
            maxLife: 120 + Math.random() * 80,
            size: 3 + Math.random() * 3,
          });
        }
      }
    }
  }
  // Fireflies/sparkles in attic
  if (zone === 3) {
    for (let i = 0; i < 15; i++) {
      game.ambientParticles.push({
        type: 'firefly',
        x: Math.random() * LW * TS,
        y: 40 + Math.random() * (LH - 4) * TS,
        baseX: Math.random() * LW * TS,
        baseY: 40 + Math.random() * (LH - 4) * TS,
        vx: 0, vy: 0,
        life: Math.random() * 300,
        maxLife: 300,
        size: 2,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }
}

function updateAmbientParticles() {
  const t = game.tick;
  for (const p of game.ambientParticles) {
    if (p.type === 'dust') {
      p.x += p.vx + Math.sin(t * 0.02 + p.life) * 0.1;
      p.y += p.vy;
      p.life--;
      if (p.life <= 0) {
        // Reset dust mote
        p.x = game.camX + Math.random() * W;
        p.y = game.camY + H + 10;
        p.life = 200 + Math.random() * 300;
      }
    } else if (p.type === 'drip') {
      if (p.delay > 0) { p.delay--; continue; }
      p.life++;
      p.y += p.vy;
      if (p.life >= p.maxLife || p.y > LH * TS) {
        // Reset drip
        p.y = Math.random() * 20;
        p.life = 0;
        p.delay = 60 + Math.floor(Math.random() * 180);
      }
    } else if (p.type === 'steam') {
      p.life++;
      p.x += p.vx + Math.sin(t * 0.03 + p.x) * 0.3;
      p.y += p.vy;
      if (p.life >= p.maxLife) {
        p.y = p.baseY;
        p.life = 0;
        p.x = p.baseY / TS * TS + Math.random() * TS; // stay near water
      }
    } else if (p.type === 'firefly') {
      p.phase += 0.02;
      p.x = p.baseX + Math.sin(p.phase) * 30 + Math.sin(t * 0.01 + p.phase) * 15;
      p.y = p.baseY + Math.cos(p.phase * 0.7) * 20;
      p.life++;
      if (p.life >= p.maxLife) p.life = 0;
    }
  }
}

function drawAmbientParticles() {
  const cx2 = ctx;
  for (const p of game.ambientParticles) {
    const sx = p.x - game.camX;
    const sy = p.y - game.camY;
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;

    if (p.type === 'dust') {
      const a = Math.min(p.alpha, p.life / 60);
      cx2.fillStyle = `rgba(220,210,190,${a})`;
      cx2.fillRect(sx, sy, p.size, p.size);
    } else if (p.type === 'drip') {
      if (p.delay > 0) continue;
      cx2.fillStyle = `rgba(80,180,255,0.6)`;
      cx2.fillRect(sx, sy, 1, 3);
      cx2.fillRect(sx-1, sy+1, 3, 1); // droplet cross
    } else if (p.type === 'steam') {
      const progress = p.life / p.maxLife;
      const a = Math.sin(progress * Math.PI) * 0.15;
      const sz = p.size + progress * 4;
      cx2.fillStyle = `rgba(200,220,255,${a})`;
      cx2.beginPath();
      cx2.arc(sx, sy, sz, 0, Math.PI*2);
      cx2.fill();
    } else if (p.type === 'firefly') {
      const glow = Math.sin(p.life / p.maxLife * Math.PI * 4) * 0.5 + 0.5;
      const a = glow * 0.7;
      cx2.fillStyle = `rgba(255,255,150,${a})`;
      cx2.fillRect(sx-1, sy-1, 3, 3);
      // Glow halo
      cx2.fillStyle = `rgba(255,255,100,${a*0.3})`;
      cx2.fillRect(sx-3, sy-3, 7, 7);
    }
  }
}

// ===================== COLLISION =====================
function isSolid(tx, ty) {
  const ld = game.levelData;
  if (!ld) return false;
  if (ty < 0) return false;
  if (ty >= LH || tx < 0 || tx >= LW) return true;
  const t = ld.tiles[ty][tx];
  return t >= 1 && t <= 5; // solid tiles
}

function isOneWay(tx, ty) {
  const ld = game.levelData;
  if (!ld || ty < 0 || ty >= LH || tx < 0 || tx >= LW) return false;
  return ld.tiles[ty][tx] === 7;
}

function isWater(tx, ty) {
  const ld = game.levelData;
  if (!ld || ty < 0 || ty >= LH || tx < 0 || tx >= LW) return false;
  return ld.tiles[ty][tx] === 6;
}

function tileAt(tx, ty) {
  const ld = game.levelData;
  if (!ld || ty < 0 || ty >= LH || tx < 0 || tx >= LW) return 0;
  return ld.tiles[ty][tx];
}

  }
  if (zone === 4) {
    return { vents:[{x:24*TS,y:(LH-5)*TS,w:2*TS,h:6*TS,phase:0},{x:67*TS,y:(LH-5)*TS,w:2*TS,h:7*TS,phase:80}] };
  }
  if (zone === 5) {
    return { shafts:[{x:44*TS,y:5*TS,w:4*TS,h:10*TS},{x:66*TS,y:6*TS,w:4*TS,h:9*TS}] };
  }
  if (zone === 6) {
    return { wind:[{x:42*TS,y:4*TS,w:12*TS,h:8*TS,phase:0},{x:70*TS,y:3*TS,w:10*TS,h:8*TS,phase:100}] };
  }
  return {};
}

function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function gainBennyXP(amount) {
  game.bennyXP += amount;
  let needed = 4 + game.bennyLevel * 3;
  while (game.bennyXP >= needed && game.bennyLevel < 5) {
    game.bennyXP -= needed;
    game.bennyLevel++;
    game.bennyGlow = 50;
    sayBenny(`${getBennyTitle(game.bennyLevel)}!`, 78, '#ffee88');
    addParticles(game.bennyX + 10, game.bennyY + 10, '#ffee88', 18);
    playSound('key');
    needed = 4 + game.bennyLevel * 3;
  }
}

function sayBenny(text, duration = 54, color = '#ffee88') {
  game.bennySpeech = text;
  game.bennySpeechTimer = duration;
  game.bennySpeechColor = color;
}

function applyFloorMechanics() {
  const ld = game.levelData;
  if (!ld) return;
  const zones = getFloorMechanicZones(ld.zone);
  const px = game.px + 4;
  const py = game.py + 4;
  const pw = CHAR_W - 8;
  const ph = CHAR_H - 8;

  if (zones.sprays) {
    for (const z of zones.sprays) {
      if (rectsOverlap(px, py, pw, ph, z.x, z.y, z.w, z.h)) {
        game.pvy = Math.min(game.pvy, -4.8);
        game.pvx += game.facing * 0.08;
        addParticles(game.px + CHAR_W/2, game.py + CHAR_H, '#66ccff', 1);
      }
    }
  }

  if (zones.soap && game.onGround) {
    for (const z of zones.soap) {
      if (rectsOverlap(px, py + ph - 6, pw, 8, z.x, z.y, z.w, z.h)) {
        game.px += z.dir * 1.8;
        game.animFrame = (game.tick >> 2) & 1 ? 4 : game.animFrame;
      }
    }
  }

  if (zones.bubbles) {
    for (const z of zones.bubbles) {
      if (rectsOverlap(px, py, pw, ph, z.x, z.y, z.w, z.h)) {
        game.pvy = Math.min(game.pvy, -2.4);
        if ((game.tick & 7) === 0) addParticles(game.px + CHAR_W/2, game.py + CHAR_H, '#eef8ff', 2);
      }
    }
  }

  if (zones.belts && game.onGround) {
    for (const z of zones.belts) {
      if (rectsOverlap(px, py + ph - 6, pw, 8, z.x, z.y, z.w, z.h)) {
        game.px += z.dir * 1.4;
      }
    }
  }

  if (zones.vents) {
    for (const z of zones.vents) {
      const active = ((game.tick + z.phase) % 140) < 50;
      if (active && rectsOverlap(px, py, pw, ph, z.x, z.y, z.w, z.h)) {
        game.pvy = Math.min(game.pvy, -5.3);
        addParticles(game.px + CHAR_W/2, game.py + CHAR_H, '#d8ecff', 2);
      }
    }
  }

  if (zones.shafts) {
    for (const z of zones.shafts) {
      if (rectsOverlap(px, py, pw, ph, z.x, z.y, z.w, z.h)) {
        game.pvy = Math.min(game.pvy, -1.8);
      }
    }
  }

  if (zones.wind) {
    for (const z of zones.wind) {
      const gust = ((game.tick + z.phase) % 160) < 70;
      if (gust && rectsOverlap(px, py, pw, ph, z.x, z.y, z.w, z.h)) {
        game.px += 1.4;
        game.pvy = Math.min(game.pvy, -0.6);
      }
    }
  }
}

function getBennyTargetInfo() {
  const ld = game.levelData;
  if (!ld) return null;
  if (game.hasKey) {
    return { x:(LW - 3) * TS + TS/2, y:(LH - 3) * TS + TS/2, color:'#ffdd00', label:'stairs' };
  }
  if (game.showingPictures) {
    const correct = ld.qBlocks.find(q => q.showingPicture && q.isCorrectPicture);
    if (correct) return { x:correct.x * TS + TS/2, y:correct.y * TS + TS/2, color:'#ff77cc', label:'picture' };
  }
  const nextBlock = ld.qBlocks.find(q => !q.hit);
  if (nextBlock) return { x:nextBlock.x * TS + TS/2, y:nextBlock.y * TS + TS/2, color:'#88ddff', label:'clue' };
  const bonus = ld.bonusLetters.find(b => !b.collected);
  if (bonus) return { x:bonus.x * TS + TS/2, y:bonus.y * TS + TS/2, color:'#aaff66', label:'bonus' };
  return null;
}

function tryBennyFetch() {
  const ld = game.levelData;
  if (!ld) return false;
  const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];
  const fetchRange = 110 + game.bennyLevel * 24;
  let best = null;

  for (const bl of ld.bonusLetters) {
    if (bl.collected) continue;
    const tx = bl.x * TS + TS/2;
    const ty = bl.y * TS + TS/2;
    const dist = Math.hypot(tx - game.px, ty - game.py);
    if (dist < fetchRange && (!best || dist < best.dist)) {
      best = { kind:'bonus', obj:bl, x:tx, y:ty, dist };
    }
  }
  for (const sp of ld.slimePickups) {
    if (sp.collected) continue;
    const tx = sp.x * TS + TS/2;
    const ty = sp.y * TS + TS/2;
    const dist = Math.hypot(tx - game.px, ty - game.py);
    if (dist < fetchRange && (!best || dist < best.dist)) {
      best = { kind:'slime', obj:sp, x:tx, y:ty, dist };
    }
  }

  if (!best) return false;

  game.bennyPing = 28;
  game.bennyPingX = best.x;
  game.bennyPingY = best.y;
  game.bennyGlow = 34;
  game.bennyX += (best.x - game.bennyX) * 0.25;
  game.bennyY += (best.y - game.bennyY) * 0.25;
  playSound('benny');

  if (best.kind === 'bonus') {
    const bl = best.obj;
    bl.collected = true;
    ld.tiles[bl.y][bl.x] = 0;
    for (let i = 0; i < game.mysteryWord.length; i++) {
      if (!game.mysteryCollected[i] && game.mysteryWord[i] === bl.letter) {
        game.mysteryCollected[i] = true;
        break;
      }
    }
    game.score += 25;
    addParticles(best.x, best.y, '#ffdd66', 12);
    sayBenny('Got it!', 42, '#ffee88');
    gainBennyXP(1);
    playSound('collect');
    if (game.mysteryCollected.every(c => c)) {
      game.score += 500;
      game.slime += 5;
      sayBenny('Bonus word!', 62, '#ffdd66');
      playSound('key');
      gainBennyXP(2);
    }
  } else {
    const sp = best.obj;
    sp.collected = true;
    ld.tiles[sp.y][sp.x] = 0;
    game.slime += 5;
    addParticles(best.x, best.y, '#88dd44', 12);
    sayBenny('Slime stash!', 42, '#aaff88');
    gainBennyXP(1);
    playSound('collect');
  }
  return true;
}

function tryBennyReveal() {
  const ld = game.levelData;
  if (!ld || !game.showingPictures) return false;
  const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];
  if (diff.key === 'hard' || game.bennyLevel < 3) return false;
  const correct = ld.qBlocks.find(q => q.showingPicture && q.isCorrectPicture);
  if (!correct) return false;
  game.bennyPing = 40;
  game.bennyPingX = correct.x * TS + TS/2;
  game.bennyPingY = correct.y * TS + TS/2;
  game.bennyGlow = 42;
  game.revealTargetUntil = game.tick + (diff.key === 'easy' ? 80 : 48);
  sayBenny(diff.key === 'easy' ? 'There!' : 'Peek!', 42, '#ffdd88');
  playSound('benny');
  return true;
}

function tryBennyZapCommand() {
  const ld = game.levelData;
  if (!ld) return false;
  let chosen = null;
  let best = 140 + game.bennyLevel * 10;
  for (const e of ld.enemies) {
    if (!e.alive) continue;
    const dx = (e.x + GRUZZLE_W/2) - (game.px + CHAR_W/2);
    const dy = (e.y + GRUZZLE_H/2) - (game.py + CHAR_H/2);
    const dist = Math.hypot(dx, dy);
    if (dist < best) {
      best = dist;
      chosen = e;
    }
  }
  if (!chosen) return false;

  chosen.stunned = 110;
  chosen.vx = Math.sign(chosen.x - game.px || 1) * 3.2;
  chosen.hitFlash = 18;
  game.bennyPing = 32;
  game.bennyPingX = chosen.x + GRUZZLE_W/2;
  game.bennyPingY = chosen.y + GRUZZLE_H/2;
  game.bennyGlow = 44;
  game.bennyCooldown = Math.max(90, 150 - game.bennyLevel * 10);
  game.bennyX += (chosen.x - game.bennyX) * 0.22;
  game.bennyY += (chosen.y - game.bennyY) * 0.16;
  addParticles(chosen.x + GRUZZLE_W/2, chosen.y + GRUZZLE_H/2, '#88ff88', 18);
  addParticles(game.bennyX + 8, game.bennyY + 8, '#ffee88', 10);
  sayBenny('Zap!', 34, '#b6ff8c');
  gainBennyXP(1);
  playSound('benny');
  return true;
}

function updateBennyHelper() {
  const ld = game.levelData;
  if (!ld) return;
  const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];
  const info = getBennyTargetInfo();
  const scoutOffset = diff.bennyScout && info ? Math.sign(info.x - game.px) * 42 : 0;
  const baseTarget = game.px - 24 * game.facing;
  const nudgedTarget = info ? baseTarget + Math.sign(info.x - game.px) * 18 + scoutOffset : baseTarget;
  game.bennyX += (nudgedTarget - game.bennyX) * 0.08;
  game.bennyY += ((game.py + CHAR_H - 30) - game.bennyY) * 0.1;
  game.bennyFrame = (game.tick >> 3) & 1;
  if (game.bennyGlow > 0) game.bennyGlow--;
  if (game.bennyCooldown > 0) game.bennyCooldown--;
  if (game.bennyCommandCooldown > 0) game.bennyCommandCooldown--;
  if (game.bennyPing > 0) game.bennyPing--;
  if (game.bennySpeechTimer > 0) game.bennySpeechTimer--;

  if (info && diff.bennyScout && (game.tick % 95 === 0)) {
    game.bennyPing = 34;
    game.bennyPingX = info.x;
    game.bennyPingY = info.y;
    addParticles(info.x, info.y, info.color, 10);
  }

  if (game.bennyCooldown <= 0) {
    let chosen = null;
    let best = 90;
    for (const e of ld.enemies) {
      if (!e.alive || e.stunned > 0) continue;
      const dx = (e.x + GRUZZLE_W/2) - (game.bennyX + 10);
      const dy = (e.y + GRUZZLE_H/2) - (game.bennyY + 12);
      const dist = Math.hypot(dx, dy);
      if (dist < best) { best = dist; chosen = e; }
    }
    if (chosen) {
      chosen.stunned = 75;
      chosen.vx = Math.sign(chosen.x - game.bennyX || 1) * 2.2;
      chosen.hitFlash = 12;
      game.bennyCooldown = 180;
      game.bennyGlow = 36;
      addParticles(chosen.x + GRUZZLE_W/2, chosen.y + GRUZZLE_H/2, '#88ff88', 12);
      addParticles(game.bennyX + 8, game.bennyY + 8, '#ffee88', 8);
      sayBenny('Zap!', 40, '#b6ff8c');
      gainBennyXP(1);
      playSound('benny');
    }
  }
}

// ===================== PHYSICS & UPDATE =====================
function updatePlaying() {
  if (!game.levelData) return;
  const ld = game.levelData;
  const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];
  game.tick++;
  updateAmbientParticles();
  if (game.floorIntroTimer > 0) game.floorIntroTimer--;
  if (game.bennyCutsceneTimer > 0) game.bennyCutsceneTimer--;
  if (game.factTimer > 0) game.factTimer--;
  if (game.slimeCooldown > 0) game.slimeCooldown--;

  // Celebrating animation
  if (game.celebrating > 0) {
    game.celebrating--;
    game.animFrame = 5;
    return;
  }

  // Input
  let dx = 0;
  if (isLeft()) { dx = -SPEED; game.facing = -1; }
  if (isRight()) { dx = SPEED; game.facing = 1; }

  // Animation
  if (dx !== 0) {
    game.animTimer++;
    if (game.animTimer > 6) { game.animTimer = 0; game.animFrame = (game.animFrame % 3) + 1; }
  } else {
    game.animFrame = 0; game.animTimer = 0;
  }

  // Gravity
  game.pvy += GRAV;
  if (game.pvy > MAXFALL) game.pvy = MAXFALL;

  // Jump
  if (isJump() && (game.onGround || game.coyoteFrames > 0)) {
    game.pvy = JUMPV;
    game.onGround = false;
    game.coyoteFrames = 0;
    game.animFrame = 4;
    playSound('jump');
  }

  // Slime attack
  if (isSlime() && game.slime > 0 && game.slimeCooldown <= 0) {
    game.slime--;
    game.slimeCooldown = diff.slimeCooldown;
    game.slimeProj.push({
      x: game.px + (game.facing > 0 ? CHAR_W + 10 : -10),
      y: game.py + 19,
      vx: game.facing * 12,
      life: 60,
      size: 24,
    });
    addParticles(game.px + (game.facing > 0 ? CHAR_W : 0), game.py + 16, '#99ee66', 8);
    playSound('slime');
  }

  // Benny command
  if (isBenny() && game.bennyCommandCooldown <= 0) {
    if (tryBennyZapCommand()) {
      game.bennyCommandCooldown = Math.max(18, 48 - game.bennyLevel * 4);
    } else if (tryBennyFetch()) {
      game.bennyCommandCooldown = Math.max(28, 74 - game.bennyLevel * 8);
    } else if (tryBennyReveal()) {
      game.bennyCommandCooldown = Math.max(34, 84 - game.bennyLevel * 6);
    } else {
      sayBenny('Hmm?', 28, '#d8efff');
      playSound('benny');
      game.bennyPing = 18;
      game.bennyPingX = game.bennyX + 10;
      game.bennyPingY = game.bennyY;
      game.bennyCommandCooldown = 24;
    }
  }

  // Horizontal movement
  game.pvx = dx;
  let newX = game.px + game.pvx;
  // Clamp to level bounds
  if (newX < 0) newX = 0;
  if (newX > ld.width - CHAR_W) newX = ld.width - CHAR_W;

  // Horizontal collision
  const charTop = game.py + 4;
  const charBot = game.py + CHAR_H - 2;
  const charMid = game.py + CHAR_H / 2;
  if (game.pvx > 0) {
    const tx = Math.floor((newX + CHAR_W - 1) / TS);
    if (isSolid(tx, Math.floor(charTop/TS)) || isSolid(tx, Math.floor(charMid/TS)) || isSolid(tx, Math.floor(charBot/TS))) {
      newX = tx * TS - CHAR_W;
    }
  } else if (game.pvx < 0) {
    const tx = Math.floor(newX / TS);
    if (isSolid(tx, Math.floor(charTop/TS)) || isSolid(tx, Math.floor(charMid/TS)) || isSolid(tx, Math.floor(charBot/TS))) {
      newX = (tx + 1) * TS;
    }
  }
  game.px = newX;

  // Vertical movement
  let newY = game.py + game.pvy;

  // Vertical collision
  game.onGround = false;
  if (game.pvy >= 0) {
    // Falling - check below
    const footY = newY + CHAR_H;
    const leftTX = Math.floor((game.px + 4) / TS);
    const rightTX = Math.floor((game.px + CHAR_W - 5) / TS);
    const ty = Math.floor(footY / TS);

    let landed = false;
    for (let checkTX = leftTX; checkTX <= rightTX; checkTX++) {
      if (isSolid(checkTX, ty)) {
        landed = true; break;
      }
      // One-way: only land if coming from above
      if (isOneWay(checkTX, ty)) {
        const prevFootY = game.py + CHAR_H;
        if (Math.floor(prevFootY / TS) < ty) {
          landed = true; break;
        }
      }
    }
    if (landed) {
      newY = ty * TS - CHAR_H;
      game.pvy = 0;
      game.onGround = true;
      game.coyoteFrames = COYOTE;
    }
  } else {
    // Rising - check above
    const headY = newY + 2;
    const leftTX = Math.floor((game.px + 4) / TS);
    const rightTX = Math.floor((game.px + CHAR_W - 5) / TS);
    const ty = Math.floor(headY / TS);
    for (let checkTX = leftTX; checkTX <= rightTX; checkTX++) {
      if (isSolid(checkTX, ty)) {
        newY = (ty + 1) * TS - 2;
        game.pvy = 0;
        // Check if this is a Q block
        checkQBlockHit(checkTX, ty);
        break;
      }
      // Also check Q block bump
      if (tileAt(checkTX, ty) === 11) {
        checkQBlockHit(checkTX, ty);
      }
    }
  }

  if (!game.onGround && game.coyoteFrames > 0) game.coyoteFrames--;
  game.py = newY;

  // Per-floor signature mechanics
  applyFloorMechanics();

  // Fall into water
  const footTX = Math.floor((game.px + CHAR_W/2) / TS);
  const footTY = Math.floor((game.py + CHAR_H) / TS);
  if (isWater(footTX, footTY)) {
    hurtPlayer();
    game.px = 64; game.py = (LH - 4) * TS;
    game.pvy = 0;
  }

  // Check invincibility
  if (game.invincible > 0) game.invincible--;

  // Camera follow (tighter, more Duke-like)
  const viewW = W / CAMERA_ZOOM;
  const viewH = H / CAMERA_ZOOM;
  const lookAhead = game.facing * 54;
  const targetCamX = game.px - viewW * 0.42 + lookAhead;
  const targetCamY = game.py - viewH * 0.56 + CHAR_H / 2;
  game.camX += (targetCamX - game.camX) * 0.16;
  game.camY += (targetCamY - game.camY) * 0.14;
  // Clamp camera
  game.camX = Math.max(0, Math.min(ld.width - viewW, game.camX));
  game.camY = Math.max(0, Math.min(ld.height - viewH, game.camY));

  // Pickup collision (Q blocks, bonus letters, slime, etc.)
  checkPickups();

  // Update Benny helper
  updateBennyHelper();

  // Update enemies
  updateEnemies();

  // Update slime projectiles
  updateSlimeProjectiles();

  // Update particles
  updateParticles();

  // Check exit door
  if (game.hasKey) {
    const doorTX = LW - 3, doorTY = LH - 3;
    const pCX = game.px + CHAR_W/2, pCY = game.py + CHAR_H/2;
    const dX = doorTX * TS + TS/2, dY = doorTY * TS + TS/2;
    if (Math.abs(pCX - dX) < TS && Math.abs(pCY - dY) < TS*1.5) {
      // Level complete!
      playSound('complete');
      game.score += 500;
      game.level++;
      if (game.level >= FLOOR_COUNT) {
        game.state = STATES.WIN;
      } else {
        game.state = STATES.COMPLETE;
      }
    }
  }
}

function checkQBlockHit(tx, ty) {
  const ld = game.levelData;
  if (!ld || tileAt(tx, ty) !== 11) return;
  if (game.showingPictures) return; // Already matching a word

  // Find which Q block this is
  const qb = ld.qBlocks.find(q => q.x === tx && q.y === ty && !q.hit);
  if (!qb) return;

  // Reveal this word — STAY IN LEVEL (Word Rescue style!)
  const wordIdx = qb.wordIdx;
  const word = ld.levelWords[wordIdx];
  const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];
  game.currentWord = word;
  game.currentWordIdx = wordIdx;
  game.targetPreviewWord = diff.key === 'easy' ? word : null;
  game.showingPictures = true;
  game.hitQBlock = qb; // The block that was hit
  speakWord(diff.key === 'medium' ? `Read the word ${word}` : word);
  if (diff.key === 'medium') {
    sayBenny(`Read: ${getReadingPrompt(word)}`, 72, '#c7f6a2');
  } else if (diff.key === 'hard') {
    sayBenny(`Word: ${word}`, 54, '#d8efff');
  }
  playSound('collect');

  // Assign pictures to ALL other unhit Q blocks in the level
  // One of them gets the CORRECT picture, rest get random wrong ones
  const otherQBlocks = ld.qBlocks.filter(q => q !== qb && !q.hit);
  if (otherQBlocks.length === 0) {
    // No other blocks — auto-match
    handleCorrectMatch(qb);
    return;
  }

  // Pick which block gets the correct answer
  const correctIdx = Math.floor(Math.random() * otherQBlocks.length);

  // Get wrong words for the other blocks
  const wrongWords = ld.levelWords.filter(w => w !== word);
  const extraWrong = WORD_LIST.filter(w => w !== word && !wrongWords.includes(w));
  const allWrong = [...wrongWords, ...extraWrong].sort(() => Math.random() - 0.5);

  let wrongIdx = 0;
  otherQBlocks.forEach((oqb, i) => {
    if (i === correctIdx) {
      oqb.pictureWord = word; // Correct answer!
      oqb.isCorrectPicture = true;
    } else {
      oqb.pictureWord = allWrong[wrongIdx % allWrong.length] || 'PIPE';
      oqb.isCorrectPicture = false;
      wrongIdx++;
    }
    oqb.showingPicture = true;
  });

  // The hit block itself disappears (becomes empty)
  qb.hit = true;
  ld.tiles[qb.y][qb.x] = 0;
  addParticles(qb.x * TS + TS/2, qb.y * TS + TS/2, '#cc44ff', 12);
}

// Called when player touches a picture-showing Q block in the level
function handlePictureBlockTouch(qb) {
  if (!game.showingPictures || !qb.showingPicture) return;

  const ld = game.levelData;
  const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];

  if (qb.isCorrectPicture) {
    // CORRECT! Player found the right picture!
    handleCorrectMatch(qb);
  } else {
    // WRONG! Spawn a Gruzzle that actively chases the player for a short burst.
    playSound('wrong');
    game.invincible = Math.max(game.invincible, 36);
    const type = getGruzzleType(ld.zone);
    ld.enemies.push({
      x: qb.x * TS,
      y: qb.y * TS - 20,
      vx: Math.sign((game.px + CHAR_W / 2) - (qb.x * TS) || 1) * (diff.key === 'easy' ? 0.7 : 1.1) * type.speedScale,
      zone: ld.zone,
      kind: type.key,
      name: type.name,
      alive: true, frame: 0,
      stunned: diff.key === 'easy' ? 40 : diff.key === 'medium' ? 24 : 16,
      aggro: diff.key === 'easy' ? 150 : diff.key === 'medium' ? 210 : 280,
      wrongSpawn: true,
      patrolLeft: Math.max(0, game.px - (diff.key === 'easy' ? 80 : 140)),
      patrolRight: Math.min(ld.width - GRUZZLE_W, game.px + (diff.key === 'easy' ? 80 : 140)),
    });
    if (diff.key === 'easy') {
      sayBenny('Uh oh! Keep moving!', 42, '#ffd8a8');
      game.factText = 'Wrong picture. A little Gruzzle is after you. Try again!';
      game.factTimer = 90;
    } else {
      sayBenny('Wrong one! Run!', 38, '#ffd8a8');
    }
    addParticles(qb.x * TS + TS/2, qb.y * TS + TS/2, '#ff3333', 12);
    // The wrong picture block stays — player can try others
    qb.showingPicture = false; // Hide this wrong one
    qb.pictureWord = null;
  }
}

function handleCorrectMatch(matchedQb) {
  const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];
  playSound('match');
  game.score += 100;
  game.matched++;
  game.celebrating = 60;
  speakWord(game.currentWord);
  if (diff.key === 'medium') {
    game.factText = `${game.currentWord}: read it, say it, then match the picture.`;
    game.factTimer = 150;
  } else if (diff.key === 'hard') {
    if (!game.hardQuizShown) {
      game.factText = getFloorQuiz(game.level);
      game.hardQuizShown = true;
      sayBenny('Quiz time!', 54, '#ffee88');
    } else {
      game.factText = `${getWordFact(game.currentWord)}  ${getFloorFact(game.level)}`;
    }
    game.factTimer = 210;
  } else {
    game.factText = `${game.currentWord}! Great picture match.`;
    game.factTimer = 90;
  }

  const ld = game.levelData;

  // Big celebration particles at the matched block
  if (matchedQb) {
    addParticles(matchedQb.x * TS + TS/2, matchedQb.y * TS + TS/2, '#ffdd00', 20);
    addParticles(matchedQb.x * TS + TS/2, matchedQb.y * TS + TS/2, '#ff77cc', 10);
  }

  // Clear all picture displays — matching round is over
  ld.qBlocks.forEach(q => {
    q.showingPicture = false;
    q.pictureWord = null;
    q.isCorrectPicture = false;
  });

  game.showingPictures = false;
  game.currentWord = null;
  game.currentWordIdx = -1;
  game.targetPreviewWord = null;
  game.hitQBlock = null;

  // Check if all 7 matched → give key
  const needed = game.levelData?.requiredClues || 7;
  if (game.matched >= needed) {
    game.hasKey = true;
    playSound('key');
    addParticles(game.px + CHAR_W/2, game.py, '#ffdd00', 30);
    addParticles(game.px + CHAR_W/2, game.py, '#ffffff', 15);
  }
}

function checkPickups() {
  const ld = game.levelData;
  if (!ld) return;
  const pLeft = game.px + 4, pRight = game.px + CHAR_W - 4;
  const pTop = game.py + 4, pBot = game.py + CHAR_H - 4;

  // Check picture blocks (Word Rescue in-level matching!)
  if (game.showingPictures) {
    for (const qb of ld.qBlocks) {
      if (!qb.showingPicture || qb.hit) continue;
      const bx = qb.x * TS, by = qb.y * TS;
      if (pRight > bx && pLeft < bx + TS && pBot > by && pTop < by + TS) {
        handlePictureBlockTouch(qb);
        break; // Only touch one per frame
      }
    }
  }

  // Check bonus letters
  for (const bl of ld.bonusLetters) {
    if (bl.collected) continue;
    const bx = bl.x * TS, by = bl.y * TS;
    if (pRight > bx && pLeft < bx + TS && pBot > by && pTop < by + TS) {
      bl.collected = true;
      ld.tiles[bl.y][bl.x] = 0;
      // Find next uncollected letter in mystery word
      for (let i = 0; i < game.mysteryWord.length; i++) {
        if (!game.mysteryCollected[i] && game.mysteryWord[i] === bl.letter) {
          game.mysteryCollected[i] = true;
          break;
        }
      }
      playSound('collect');
      game.score += 25;
      addParticles(bx, by, PAL.yellow, 8);

      // All bonus letters collected?
      if (game.mysteryCollected.every(c => c)) {
        game.score += 500;
        game.slime += 5;
        playSound('key');
      }
    }
  }

  // Check slime pickups
  for (const sp of ld.slimePickups) {
    if (sp.collected) continue;
    const sx = sp.x * TS, sy = sp.y * TS;
    if (pRight > sx && pLeft < sx + TS && pBot > sy && pTop < sy + TS) {
      sp.collected = true;
      ld.tiles[sp.y][sp.x] = 0;
      game.slime += 5;
      playSound('collect');
      addParticles(sx, sy, '#88dd44', 8);
    }
  }

  // Touching a Q block from the side (not bumping from below)
  const centerTX = Math.floor((game.px + CHAR_W/2) / TS);
  const centerTY = Math.floor((game.py + CHAR_H/2) / TS);
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const tx = centerTX + dx, ty = centerTY + dy;
      if (tileAt(tx, ty) === 11) {
        const bx = tx * TS, by = ty * TS;
        if (pRight > bx && pLeft < bx + TS && pBot > by && pTop < by + TS) {
          checkQBlockHit(tx, ty);
          return;
        }
      }
    }
  }
}

function updateEnemies() {
  const ld = game.levelData;
  if (!ld) return;
  const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];

  for (const e of ld.enemies) {
    if (!e.alive) continue;
    const type = getGruzzleType(e.zone);

    if (e.stunned > 0) {
      e.stunned--;
      if (e.hitFlash > 0) e.hitFlash--;
      e.frame = ((game.tick >> 2) & 1);
      e.x += Math.sin(game.tick * 0.4 + e.y) * 0.5;
      continue;
    }

    if (e.hitFlash > 0) e.hitFlash--;

    e.frame = ((game.tick >> 3) & 1);

    // Movement
    e.x += e.vx;

    // Zone-specific behavior
    const z = e.zone;
    if (z >= 2) {
      // Blue/Red gruzzle: slightly follow player
      const toPlayer = game.px - e.x;
      const followStrength = (z === 2 ? 0.01 : z === 3 ? 0.02 : z === 4 ? 0.05 : 0.06) * diff.enemyFollow * (1 + type.followBias);
      e.vx += Math.sign(toPlayer) * (diff.key === 'easy' ? followStrength * 0.5 : followStrength);
      e.vx = Math.max(-2, Math.min(2, e.vx));
    }
    if (type.key === 'hopper' && (game.tick + (e.x|0)) % 70 === 0) {
      e.y -= diff.key === 'easy' ? 6 : 10;
    }
    if (type.key === 'snapper' && Math.abs(game.px - e.x) < 70 && (game.tick + (e.y|0)) % 48 === 0) {
      e.vx += Math.sign(game.px - e.x) * (diff.key === 'easy' ? 0.25 : 0.45);
    }
    if (type.key === 'stalker') {
      e.x += Math.sin((game.tick + e.y) * 0.08) * 0.5;
    }

    // Patrol bounds
    if (e.x <= e.patrolLeft) { e.x = e.patrolLeft; e.vx = Math.abs(e.vx); }
    if (e.x >= e.patrolRight) { e.x = e.patrolRight; e.vx = -Math.abs(e.vx); }

    // Simple gravity for enemies
    const eTX = Math.floor((e.x + GRUZZLE_W/2) / TS);
    const eTY = Math.floor((e.y + GRUZZLE_H) / TS);
    if (eTY < LH && !isSolid(eTX, eTY) && !isOneWay(eTX, eTY) && eTY < LH-2) {
      e.y += 2; // fall
    }

    // Collision with player
    if (game.invincible <= 0) {
      const pLeft = game.px + 4, pRight = game.px + CHAR_W - 4;
      const pTop = game.py + 4, pBot = game.py + CHAR_H - 4;
      if (pRight > e.x && pLeft < e.x + GRUZZLE_W && pBot > e.y && pTop < e.y + GRUZZLE_H) {
        hurtPlayer();
      }
    }
  }
}

function updateSlimeProjectiles() {
  for (let i = game.slimeProj.length - 1; i >= 0; i--) {
    const s = game.slimeProj[i];
    s.x += s.vx;
    s.life--;

    // Check wall collision
    const leftTX = Math.floor((s.x - s.size * 0.35) / TS);
    const rightTX = Math.floor((s.x + s.size * 0.35) / TS);
    const topTY = Math.floor((s.y - s.size * 0.3) / TS);
    const botTY = Math.floor((s.y + s.size * 0.3) / TS);
    const hitWall =
      isSolid(leftTX, topTY) || isSolid(rightTX, topTY) ||
      isSolid(leftTX, botTY) || isSolid(rightTX, botTY);
    if (hitWall || s.life <= 0) {
      game.slimeProj.splice(i, 1);
      addParticles(s.x, s.y, '#88dd44', 6);
      addParticles(s.x, s.y, '#ddff99', 3);
      continue;
    }

    // Check enemy collision
    const ld = game.levelData;
    if (ld) {
      for (const e of ld.enemies) {
        if (!e.alive) continue;
        if (rectsOverlap(s.x - s.size/2, s.y - s.size/2, s.size, s.size, e.x - 6, e.y - 4, GRUZZLE_W + 12, GRUZZLE_H + 8)) {
          e.alive = false;
          e.hitFlash = 18;
          game.slimeProj.splice(i, 1);
          game.score += 50;
          game.screenShake = Math.max(game.screenShake, 7);
          playSound('collect');
          addParticles(e.x + GRUZZLE_W/2, e.y + GRUZZLE_H/2, '#88dd44', 16);
          addParticles(e.x + GRUZZLE_W/2, e.y + GRUZZLE_H/2, '#ffee88', 10);
          break;
        }
      }
    }
  }
}

function hurtPlayer() {
  if (game.invincible > 0) return;
  const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES[1];
  game.lives = Math.max(1, game.lives - 1);
  game.invincible = diff.invincible;
  game.screenShake = 12; // screen shake frames
  playSound('hurt');
  // Red burst particles
  addParticles(game.px + CHAR_W/2, game.py + CHAR_H/2, '#ff3333', 15);
  addParticles(game.px + CHAR_W/2, game.py + CHAR_H/2, '#ff8844', 8);
  addParticles(game.px + CHAR_W/2, game.py + CHAR_H/2, '#ffcc00', 5);
  // Flash the screen red briefly
  game.hurtFlash = 8;
  game.factText = 'Shake it off and try again!';
  game.factTimer = Math.max(game.factTimer, 60);
  sayBenny('You are okay!', 34, '#ffee88');
}

function getTutorialHint(ld) {
  if (!ld) return '';
  if (game.level === 0) {
    if (!game.showingPictures && game.matched === 0) return 'Move and jump to the glowing clue blocks.';
    if (game.showingPictures) return 'Touch the picture that matches the word.';
    if (!game.hasKey) return `Great. Find ${Math.max(0, (ld.requiredClues || 3) - game.matched)} more clue blocks.`;
    return 'Stairs are open. Walk to the door on the right.';
  }
  if (game.level === 1) {
    if (game.bennyCutsceneTimer > 0) return 'Benny can grab nearby goodies when you press SPACE.';
    if (!game.showingPictures && game.matched < 2) return 'Hit clue blocks and keep heading right.';
    if (game.showingPictures) return 'Match the word to the right picture block.';
    if (ld.enemies.some(e => e.alive)) return 'If a Gruzzle gets close, press SPACE to fight back.';
  }
  return '';
}

// ===================== PARTICLES =====================
function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    game.particles.push({
      x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 - 2,
      life: 20 + Math.random()*20, color, size: 2 + Math.random()*3,
    });
  }
}

function updateParticles() {
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
}
